<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estudo de Mercado — Dispositivos Inteligentes | Unifique</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* =============================================
       CORES E VARIÁVEIS — edite aqui para rebranding
       ============================================= */
    :root {
      --blue-dark:   #1a2b8c;
      --blue-mid:    #2540c0;
      --teal:        #00c8d4;
      --green-light: #a8e063;
      --yellow:      #f5c842;
      --white:       #ffffff;
      --gray-light:  #f4f6fb;
      --gray-mid:    #dde3f0;
      --text-dark:   #1a2340;
      --text-mid:    #3a4a6b;
      --red-risk:    #e03c3c;
      --card-shadow: 0 4px 24px rgba(26,43,140,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-light);
      color: var(--text-dark);
      line-height: 1.5;
      font-size: 13px;
    }

    /* ---- HEADER ---- */
    header {
      background: linear-gradient(135deg, var(--blue-dark) 60%, var(--blue-mid));
      color: var(--white);
      padding: 18px 24px 16px;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--green-light));
    }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .brand { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 4px; }
    header h1 { font-size: 1.1rem; font-weight: 700; line-height: 1.2; }
    header p  { margin-top: 4px; opacity: .75; font-size: .75rem; }

    /* ---- LAYOUT ---- */
    main { max-width: 1100px; margin: 0 auto; padding: 16px 14px 36px; }

    .section { margin-bottom: 22px; }
    .section-title {
      font-size: .82rem; font-weight: 700; color: var(--blue-dark);
      padding-bottom: 5px;
      border-bottom: 2px solid var(--teal);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title .badge {
      background: var(--teal); color: var(--white);
      font-size: .6rem; font-weight: 700; letter-spacing: 1px;
      padding: 2px 7px; border-radius: 99px; text-transform: uppercase;
    }

    /* ---- CARDS GRID ---- */
    .cards { display: grid; gap: 8px; }
    .cards-3 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .cards-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .cards-4 { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }

    .card {
      background: var(--white);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: var(--card-shadow);
      border-top: 3px solid var(--teal);
    }
    .card h3 { font-size: .72rem; color: var(--blue-dark); margin-bottom: 3px; }
    .card .big-num {
      font-size: 1.15rem; font-weight: 800; color: var(--blue-mid);
      line-height: 1;
    }
    .card .sub { font-size: .65rem; color: var(--text-mid); margin-top: 2px; }
    .card .delta {
      display: inline-block; margin-top: 4px;
      background: rgba(0,200,212,.12); color: #008a92;
      font-size: .62rem; font-weight: 700; padding: 2px 6px; border-radius: 99px;
    }

    .card.yellow  { border-top-color: var(--yellow); }
    .card.green   { border-top-color: var(--green-light); }
    .card.red     { border-top-color: var(--red-risk); }
    .card.dark    { background: var(--blue-dark); color: var(--white); border-top-color: var(--teal); }
    .card.dark h3 { color: var(--teal); }
    .card.dark .big-num { color: var(--white); }
    .card.dark .sub { color: rgba(255,255,255,.6); }

    /* ---- TABLE ---- */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      background: var(--white); border-radius: 8px;
      overflow: hidden; box-shadow: var(--card-shadow);
    }
    thead tr { background: var(--blue-dark); color: var(--white); }
    thead th { padding: 7px 10px; text-align: left; font-size: .68rem; letter-spacing: .5px; }
    tbody tr:nth-child(even) { background: var(--gray-light); }
    tbody td { padding: 6px 10px; font-size: .72rem; color: var(--text-dark); }
    tbody tr:hover { background: rgba(0,200,212,.07); }
    .highlight-row { background: rgba(245,200,66,.15) !important; font-weight: 700; }

    /* ---- PROGRESS BARS ---- */
    .progress-list { display: flex; flex-direction: column; gap: 6px; }
    .progress-item label {
      font-size: .65rem; font-weight: 600; color: var(--text-mid);
      display: flex; justify-content: space-between; margin-bottom: 2px;
    }
    .progress-track {
      height: 5px; background: var(--gray-mid); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--teal), var(--green-light));
      transition: width .6s ease;
    }
    .progress-fill.red  { background: linear-gradient(90deg, #e03c3c, #ff7070); }
    .progress-fill.yellow { background: linear-gradient(90deg, var(--yellow), #ffe08a); }

    /* ---- BRASIL KPI GRID ---- */
    .brasil-kpis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }
    .brasil-kpi {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brasil-kpi-icon { font-size: 1.1rem; line-height: 1; margin-bottom: 2px; }
    .brasil-kpi-val  { font-size: 1.15rem; font-weight: 700; color: var(--teal); line-height: 1.1; }
    .brasil-kpi-label { font-size: .62rem; color: var(--text-mid); line-height: 1.3; }
    .brasil-kpi-src { font-size: .58rem; color: rgba(255,255,255,.3); margin-top: 3px; }
    .brasil-kpi-src a { color: var(--teal); opacity: .7; text-decoration: none; }
    .brasil-kpi-src a:hover { opacity: 1; }

    /* ---- OPEX TABLE ---- */
    .opex-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .opex-box {
      background: var(--white); border-radius: 8px;
      padding: 10px 12px; box-shadow: var(--card-shadow);
    }
    .opex-box h4 { font-size: .65rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--teal); margin-bottom: 7px; }
    .opex-line {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0; border-bottom: 1px solid var(--gray-mid);
      font-size: .72rem;
    }
    .opex-line:last-child { border-bottom: none; }
    .opex-line .lbl { color: var(--text-mid); }
    .opex-line .val { font-weight: 700; color: var(--blue-dark); }
    .opex-total {
      margin-top: 6px; padding: 7px 10px;
      background: var(--blue-dark); color: var(--white);
      border-radius: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .opex-total .lbl { font-size: .65rem; }
    .opex-total .val { font-size: .88rem; font-weight: 800; color: var(--teal); }

    /* ---- CALCULADORA ---- */
    .calc-input {
      width: 88px; text-align: right; flex-shrink: 0;
      border: none; border-radius: 0;
      padding: 0; font-size: .72rem; font-weight: 700;
      font-family: inherit; color: var(--blue-dark);
      background: transparent;
    }
    .calc-editing .calc-input {
      border: 1px solid var(--gray-mid); border-radius: 4px;
      padding: 2px 6px; background: var(--gray-light);
    }
    .calc-input:focus { outline: none; border-color: var(--teal); background: #fff; }
    .calc-input.lbl-input {
      width: auto; flex: 1; text-align: left; font-weight: 400;
      margin-right: 6px; color: var(--text-mid);
    }
    .calc-output { font-weight: 700; color: var(--blue-dark); font-size: .72rem; }

    .op-badge {
      width: 18px; height: 18px; flex-shrink: 0; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 900; margin-right: 6px;
    }
    .op-add { background: rgba(0,200,212,.15); color: #007a82; }
    .op-sub { background: rgba(224,60,60,.13); color: #b02020; }
    .op-mul { background: rgba(37,64,192,.15); color: var(--blue-mid); }
    .op-div { background: rgba(245,200,66,.28); color: #8a6e00; }
    .op-pct { background: rgba(168,224,99,.28); color: #4a7a00; }
    .op-clickable { cursor: pointer; user-select: none; }
    .op-clickable:hover { filter: brightness(.85); }

    .calc-hint { font-size: .6rem; color: #bbc; margin: 0 4px; flex-shrink: 0; }

    .calc-del {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: .85rem; padding: 0 3px; line-height: 1;
      flex-shrink: 0; margin-left: 4px; width: 20px; text-align: center;
      display: none;
    }
    .calc-del:hover { color: var(--red-risk); }
    .calc-del-spacer { display: none; width: 20px; margin-left: 4px; flex-shrink: 0; }

    .op-clickable { display: none; }
    .calc-add-btn { display: none; }

    .calc-editing .op-clickable  { display: inline-flex; }
    .calc-editing .calc-del      { display: inline-flex; align-items: center; justify-content: center; }
    .calc-editing .calc-del-spacer { display: inline-block; }
    .calc-editing .calc-add-btn  { display: block; }

    .calc-add-btn {
      width: 100%; margin-top: 8px; border-radius: 5px;
      background: none; border: 1px dashed var(--gray-mid);
      padding: 5px 8px; cursor: pointer; font-family: inherit;
      font-size: .65rem; color: var(--text-mid);
    }
    .calc-add-btn:hover { border-color: var(--teal); color: var(--teal); }

    .calc-edit-toggle {
      border: 1px solid var(--gray-mid); border-radius: 4px; cursor: pointer;
      font-size: .62rem; font-weight: 600; font-family: inherit;
      padding: 2px 8px; background: none; color: var(--text-mid); margin-left: 8px;
    }
    .calc-edit-toggle:hover  { border-color: var(--teal); color: var(--teal); }
    .calc-edit-toggle.active { background: var(--teal); color: #fff; border-color: var(--teal); }

    .calc-action-btn {
      border: none; border-radius: 4px; cursor: pointer;
      font-size: .62rem; font-weight: 700; font-family: inherit;
      padding: 3px 8px; line-height: 1.4;
    }
    .calc-action-btn.save    { background: var(--teal); color: #fff; }
    .calc-action-btn.save:hover { background: #009aa2; }
    .calc-action-btn.discard { background: var(--gray-mid); color: var(--text-mid); }
    .calc-action-btn.discard:hover { background: #c8cedc; }

    /* ---- DIFF PILLS ---- */
    .diff-list { display: flex; flex-direction: column; gap: 8px; }
    .diff-item {
      display: flex; align-items: flex-start; gap: 8px;
      background: var(--white); border-radius: 8px;
      padding: 9px 11px; box-shadow: var(--card-shadow);
    }
    .diff-body { flex: 1; }
    .diff-body h4 { font-size: .75rem; font-weight: 700; color: var(--blue-dark); }
    .diff-body p  { font-size: .68rem; color: var(--text-mid); margin-top: 2px; }
    .diff-edit { display: none; flex-direction: column; gap: 3px; }
    .diff-edit-input {
      background: #f3f5fa; border: 1px solid var(--gray-mid); border-radius: 4px;
      color: var(--blue-dark); font-size: .72rem; padding: 3px 6px;
      width: 100%; box-sizing: border-box; font-family: inherit;
    }
    .diff-del {
      background: none; border: none; color: var(--gray-mid); font-size: .9rem;
      cursor: pointer; padding: 0 3px; flex-shrink: 0; align-self: center;
      display: none; line-height: 1;
    }
    .diff-del:hover { color: var(--red-risk); }
    .diff-add-btn {
      display: none; margin-top: 6px; font-size: .68rem; color: var(--teal);
      background: none; border: 1px dashed var(--teal); border-radius: 6px;
      padding: 5px 10px; cursor: pointer; width: 100%; font-family: inherit;
    }
    .diff-add-btn:hover { background: rgba(0,161,168,.06); }
    .diff-editing .diff-view     { display: none; }
    .diff-editing .diff-edit     { display: flex; }
    .diff-editing .diff-del      { display: inline-flex; }
    .diff-editing .diff-add-btn  { display: block; }

    /* ---- CONC EDIT MODE ---- */
    .conc-view { display: inline; }
    .conc-edit { display: none; }
    .conc-del-col { display: none; }
    .conc-add-btn {
      display: none; margin-top: 6px; font-size: .68rem; color: var(--teal);
      background: none; border: 1px dashed var(--teal); border-radius: 6px;
      padding: 5px 10px; cursor: pointer; width: 100%; font-family: inherit;
    }
    .conc-add-btn:hover { background: rgba(0,161,168,.06); }
    .conc-editing .conc-view    { display: none; }
    .conc-editing .conc-edit    { display: inline-block; box-sizing: border-box; }
    .conc-editing .conc-del-col { display: table-cell; }
    .conc-editing .conc-add-btn { display: block; }
    .conc-edit-input {
      background: #f3f5fa; border: 1px solid var(--gray-mid); border-radius: 4px;
      color: var(--blue-dark); font-size: .72rem; padding: 3px 6px;
      width: 100%; font-family: inherit;
    }
    .conc-select-nivel {
      background: #f3f5fa; border: 1px solid var(--gray-mid); border-radius: 4px;
      color: var(--blue-dark); font-size: .72rem; padding: 2px 4px; font-family: inherit;
    }
    .conc-del-btn {
      background: none; border: none; color: var(--gray-mid); cursor: pointer;
      font-size: .9rem; padding: 0 3px; line-height: 1;
    }
    .conc-del-btn:hover { color: var(--red-risk); }
    .conc-nota-ta {
      display: none; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px; color: rgba(255,255,255,.85); font-size: .78rem;
      padding: 7px 9px; width: 100%; box-sizing: border-box;
      min-height: 90px; resize: vertical; line-height: 1.6; font-family: inherit;
    }
    .conc-editing .conc-nota-ta { display: block; }

    /* ---- UPLINKS & FONTES ---- */
    .uplink {
      color: var(--teal); font-size: .6rem; text-decoration: none;
      opacity: .7; margin-left: 3px; vertical-align: super;
    }
    .uplink:hover { opacity: 1; }
    .fontes-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
      margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--gray-light);
    }
    .fonte-label { font-size: .6rem; color: var(--text-mid); margin-right: 2px; }
    .fonte-pill {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: .62rem; color: var(--text-mid); text-decoration: none;
      border: 1px solid var(--gray-mid); border-radius: 20px;
      padding: 2px 8px; transition: border-color .15s, color .15s;
    }
    .fonte-pill:hover { border-color: var(--teal); color: var(--teal); }

    /* ---- SECTION 1 / 2 EDIT MODE ---- */
    .sec1-edit, .sec2-edit { display: none; }
    .sec1-editing .sec1-view { display: none; }
    .sec1-editing .sec1-edit { display: block; }
    .sec2-editing .sec2-view { display: none; }
    .sec2-editing .sec2-edit { display: block; }
    .sec-edit-subtitle {
      font-size: .62rem; font-weight: 700; color: var(--text-mid);
      margin: 10px 0 5px; text-transform: uppercase; letter-spacing: .05em;
    }
    .sec-edit-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px;
    }
    .sec-edit-grid label {
      font-size: .65rem; color: var(--text-mid); display: flex; flex-direction: column; gap: 3px;
    }
    .sec-edit-input {
      background: var(--white); border: 1px solid var(--gray-mid); border-radius: 4px;
      color: var(--blue-dark); font-size: .72rem; padding: 3px 6px;
      font-family: inherit; width: 100%; box-sizing: border-box;
    }
    .sec-url-input {
      background: #f3f5fa; border: 1px dashed #8fa0c0; border-radius: 4px;
      color: var(--blue-dark); font-size: .65rem; padding: 2px 5px;
      font-family: inherit; flex: 1.5; min-width: 0;
    }
    .sec-url-input:focus { border-color: var(--teal); outline: none; background: #fff; }
    .sec-url-input::placeholder { color: #8fa0c0; }
    .sec-row-edit {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border-radius: 6px; padding: 5px 8px; margin-bottom: 4px;
    }
    .sec-row-del {
      background: none; border: none; color: var(--gray-mid); font-size: .9rem;
      cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0;
    }
    .sec-row-del:hover { color: var(--red-risk); }
    .sec-add-btn {
      font-size: .65rem; color: var(--teal); background: none;
      border: 1px dashed var(--teal); border-radius: 5px;
      padding: 4px 10px; cursor: pointer; font-family: inherit; width: 100%; margin-top: 2px;
    }
    .sec-add-btn:hover { background: rgba(0,161,168,.06); }
    .sec-card-edit-block {
      background: var(--bg); border-radius: 8px; padding: 8px 10px;
      margin-bottom: 6px; border-left: 3px solid var(--gray-mid);
    }
    .sec-card-edit-row {
      display: flex; gap: 6px; margin-bottom: 4px;
    }
    .sec-card-edit-row label {
      font-size: .65rem; color: var(--text-mid); display: flex; flex-direction: column; gap: 2px;
    }

    /* ---- RISK TABLE ---- */
    .risk-impact { font-weight: 700; color: var(--red-risk); }

    /* ---- FOOTER ---- */
    footer {
      text-align: center; padding: 16px 20px;
      font-size: .65rem; color: #aab; border-top: 1px solid var(--gray-mid);
    }

    /* ---- CHART WRAPPER ---- */
    .chart-wrap {
      background: var(--white); border-radius: 8px;
      padding: 12px; box-shadow: var(--card-shadow);
    }
    .chart-wrap canvas { max-height: 160px; }

    /* ---- TABS ---- */
    .tab-bar {
      background: var(--blue-dark);
      border-bottom: 2px solid var(--teal);
    }
    .tab-bar-center {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: stretch;
    }
    .tab-sort-btn {
      flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.45);
      font-size: .65rem; line-height: 1;
      width: 32px;
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid rgba(255,255,255,.1);
      transition: color .15s;
      font-family: inherit;
    }
    .tab-sort-btn::after { content: '▾'; font-size: .85rem; }
    .tab-sort-btn:hover { color: var(--teal); }
    .tab-nav-btn {
      flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.45);
      font-size: 1rem; line-height: 1;
      width: 28px;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s;
      font-family: inherit;
    }
    .tab-nav-btn:hover { color: var(--teal); }
    .tab-nav-btn:first-child { border-right: 1px solid rgba(255,255,255,.1); }
    .tab-nav-btn:last-child  { border-left:  1px solid rgba(255,255,255,.1); }
    .tab-bar-scroll {
      flex: 1; overflow-x: auto;
      scrollbar-width: none; white-space: nowrap;
    }
    .tab-bar-scroll::-webkit-scrollbar { display: none; }
    .tab-bar-inner {
      display: flex; gap: 0;
      padding: 0 14px;
    }
    /* modal de ordenação */
    .tab-sort-overlay {
      display: none; position: fixed; inset: 0; z-index: 900;
    }
    .tab-sort-overlay.open { display: block; }
    .tab-sort-panel {
      position: fixed; top: 78px; left: 0;
      background: var(--white); border-radius: 0 8px 8px 0;
      padding: 14px 16px; min-width: 270px;
      box-shadow: 6px 6px 28px rgba(26,43,140,.22);
      z-index: 901;
    }
    .tab-sort-panel h4 {
      font-size: .7rem; color: var(--text-mid); font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .tab-sort-list-wrap { display: flex; flex-direction: column; gap: 0; }
    .tab-sort-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 5px;
      cursor: grab; font-size: .73rem; color: var(--text-dark);
      background: var(--gray-light);
      border-top: 2px solid transparent;
      border-bottom: 2px solid transparent;
      margin-bottom: 2px;
      user-select: none; transition: background .1s;
    }
    .tab-sort-item:hover { background: var(--gray-mid); }
    .tab-sort-item.dragging { opacity: .25; }
    .tab-sort-item.drop-before { border-top-color: var(--teal); }
    .tab-sort-item.drop-after  { border-bottom-color: var(--teal); }
    .tab-sort-handle { color: #b0bcd4; font-size: .9rem; flex-shrink: 0; }
    .tab-sort-num {
      font-size: .6rem; font-weight: 700; color: var(--text-mid);
      background: var(--gray-mid); border-radius: 3px;
      padding: 1px 5px; flex-shrink: 0; min-width: 18px; text-align: center;
    }
    .tab-sort-footer {
      display: flex; justify-content: flex-end; gap: 6px;
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid var(--gray-mid);
    }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.55);
      font-size: .7rem; font-weight: 600;

      transition: color .15s, border-color .15s;

    .subtab-btn.active { color: var(--blue-dark); border-bottom-color: var(--blue-mid); }

    .timeline::before {
      content: ''; position: absolute;
      left: 15px; top: 0; bottom: 0;
      width: 2px; background: var(--gray-mid);
    }
    .timeline-item { position: relative; padding-left: 48px; margin-bottom: 18px; }
    .timeline-dot {
      position: absolute; left: 7px; top: 13px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--white); border: 2px solid var(--gray-mid); z-index: 1;
      transition: border-color .15s, background .15s;
    }
    .timeline-dot.done        { background: var(--blue-dark); border-color: var(--blue-dark); }
    .timeline-dot.em-andamento { background: var(--teal);      border-color: var(--teal); }
    .timeline-dot.planejado   { background: var(--white);     border-color: #b0bcd4; }
    .timeline-card {
      background: var(--white); border-radius: 8px;
      padding: 12px 14px 10px;
      border: 1px solid var(--gray-mid);
      box-shadow: 0 1px 6px rgba(26,43,140,.06);
      position: relative;

    .timeline-actions {
      position: absolute; top: 8px; right: 8px;
      display: flex; gap: 2px; opacity: 0;
      transition: opacity .15s;

    .tl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-mid); font-size: .7rem; font-family: inherit;

      transition: color .1s, background .1s;

    .tl-desc  { font-size: .71rem; color: var(--text-mid); line-height: 1.55; }
    .tl-badge {
      display: inline-block; margin-top: 7px;

    .tl-badge.done         { background: #eaecf7; color: var(--blue-dark); }

    .tl-dimmed { opacity: 0.4; }
    .tl-dias { font-size: .6rem; color: var(--text-mid); font-style: italic; margin: 4px 0 2px; }

    /* --- Tecnologia --- */
    .tec-wrap  { max-width:1100px; margin:0 auto; padding:24px 16px 0; }

    @media(max-width:700px){ .tec-grid{ grid-template-columns:1fr; } }
    .tec-card  { background:var(--white); border-radius:10px; box-shadow:var(--card-shadow); border-top:4px solid var(--teal); padding:18px; }
    .tec-card-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .tec-card-title { font-size:.9rem; font-weight:800; color:var(--blue-dark); flex:1; line-height:1.3; }

    .tec-ul { margin:0; padding:0; list-style:none; }

/* ---- Shared helper ---- */
const initializedSec1 = new Set();
const initializedSec2 = new Set();

function resetInitialized(id) {
  [initializedSec1, initializedSec2, initializedDiff, initializedConc, initializedPanels].forEach(s => s.delete(id));
}

/* ---- Section 1 edit ---- */
function markDirtySec1(id) {
  if (!initializedSec1.has(id)) return;
  const el = document.getElementById('sec1-dirty-' + id);
  if (el) el.style.display = 'inline-flex';
}
function hideDirtySec1(id) {
  const el = document.getElementById('sec1-dirty-' + id);
  if (el) el.style.display = 'none';
}
function toggleSec1Edit(id) {
  const section = document.getElementById('sec1-section-' + id);
  const toggle  = document.getElementById('sec1-toggle-'  + id);
  const isEdit  = section.classList.toggle('sec1-editing');
  if (toggle) { toggle.textContent = isEdit ? 'Concluir' : 'Editar'; toggle.classList.toggle('active', isEdit); }
  if (!isEdit) hideDirtySec1(id);
}
function saveSec1(id) {
  const d = DATA[id]; const m = d.mercado; const b = d.brasil;
  const gi = s => document.getElementById(s + id);
  const v  = s => parseFloat(gi(s)?.value) || 0;
  m.tamanho_bi   = v('s1-tamanho-');
  m.proj[1].bi   = v('s1-proj1-');
  m.proj[2].bi   = v('s1-proj2-');
  b.potencial_bi = v('s1-potencial-');
  m.cards_meta = [0,1,2,3].map(i => ({
    title: gi('s1-ctitle'+i+'-')?.value || '',
    sub:   gi('s1-csub'+i+'-')?.value   || '',
    delta: gi('s1-cdelta'+i+'-')?.value || '',
  }));
  m.cards_url = [0,1,2,3].map(i => (gi('s1-url'+i+'-')?.value || ''));
  b.titulo = gi('s1-btitle-')?.value || 'Contexto Brasil';
  const barCont = gi('s1-barras-');
  if (barCont) b.barras = Array.from(barCont.querySelectorAll('.sec-row-edit')).map(row => {
    const ins = row.querySelectorAll('input');
    return { label: ins[0].value, val: parseFloat(ins[1].value)||0, max: parseFloat(ins[2].value)||100, cls: row.dataset.cls||'', url: ins[3].value };
  });
  const fontCont = gi('s1-fontes-');
  if (fontCont) m.fontes = Array.from(fontCont.querySelectorAll('.sec-row-edit')).map(row => {
    const ins = row.querySelectorAll('input');
    return { label: ins[0].value, url: ins[1].value };
  });
  resetInitialized(id); renderPanel(id); persistData(id);
}
function discardSec1(id) { resetInitialized(id); renderPanel(id); }
function addSec1Bar(id) {
  const cont = document.getElementById('s1-barras-' + id);
  const div = document.createElement('div');
  div.className = 'sec-row-edit'; div.dataset.cls = '';
  div.innerHTML = `
    <input class="sec-edit-input" type="text" placeholder="Label" value="" style="flex:2" oninput="markDirtySec1('${id}')">
    <input class="sec-edit-input" type="number" placeholder="Val" value="0" style="width:65px;flex-shrink:0" oninput="markDirtySec1('${id}')">
    <input class="sec-edit-input" type="number" placeholder="Max" value="100" style="width:55px;flex-shrink:0" oninput="markDirtySec1('${id}')">
    <input class="sec-url-input" type="url" placeholder="URL da fonte..." value="" oninput="markDirtySec1('${id}')">
    <button class="sec-row-del" onclick="delSec1Bar('${id}',this)">×</button>`;
  cont.appendChild(div); markDirtySec1(id);
}
function delSec1Bar(id, btn)   { btn.closest('.sec-row-edit').remove(); markDirtySec1(id); }
function addSec1Fonte(id) {
  const cont = document.getElementById('s1-fontes-' + id);
  const div = document.createElement('div');
  div.className = 'sec-row-edit';
  div.innerHTML = `
    <input class="sec-edit-input" type="text" placeholder="Nome da fonte" value="" style="flex:1" oninput="markDirtySec1('${id}')">
    <input class="sec-url-input" type="url" placeholder="URL..." value="" oninput="markDirtySec1('${id}')">

const OP_CYCLE = [
  { sym: '+', cls: 'op-add' },
  { sym: '−', cls: 'op-sub' },
  { sym: '×', cls: 'op-mul' },
  { sym: '÷', cls: 'op-div' },
];

function cycleOp(badge, tabId) {
  const cur  = badge.dataset.op || '+';
  const next = OP_CYCLE[(OP_CYCLE.findIndex(o => o.sym === cur) + 1) % OP_CYCLE.length];
  badge.dataset.op  = next.sym;
  badge.textContent = next.sym;
  badge.className   = `op-badge op-clickable ${next.cls}`;
  recalc(tabId);
}

function applyOp(running, op, v) {
  if      (op === '+') return running + v;
  else if (op === '−') return running - v;
  else if (op === '×') return running * v;
  else if (op === '÷') return v !== 0 ? running / v : running;
  return running;
}

function recalc(id) {
  markDirty(id);
  const gi  = s => document.getElementById(s + id);
  const val = s => { const el = gi(s); return el ? (parseFloat(el.value) || 0) : 0; };

  const hw   = val('ci-hw-');
  const pts  = val('ci-pts-') || 1;
  const mes  = val('ci-mes-') || 1;
  const marg = val('ci-marg-');

  const hintEl = gi('co-hw-pts-'); if (hintEl) hintEl.textContent = pts;
  const hwSub = hw * pts;

  // CAPEX: começa com hwSub e aplica cada linha extra em cadeia
  let capexRunning = hwSub;
  document.querySelectorAll(`#capex-rows-${id} .opex-line`).forEach(row => {
    const badge = row.querySelector('.op-badge');
    const input = row.querySelector('.calc-capex-extra');
    if (!input) return;
    capexRunning = applyOp(capexRunning, badge ? (badge.dataset.op || '+') : '+', parseFloat(input.value) || 0);
  });
  const capexTotal    = capexRunning;
  const capexPorPonto = capexTotal / pts;
  const capexDiluido  = capexPorPonto / mes;

  // OPEX: começa em 0 e aplica cada linha em cadeia
  let opexRunning = 0;
  document.querySelectorAll(`#opex-rows-${id} .opex-line`).forEach(row => {
    const badge = row.querySelector('.op-badge');
    const input = row.querySelector('.calc-opex');
    if (!input) return;
    opexRunning = applyOp(opexRunning, badge ? (badge.dataset.op || '+') : '+', parseFloat(input.value) || 0);
  });
  const totalOpex  = opexRunning;
  const opexMargem = marg < 100 ? totalOpex / (1 - marg / 100) : totalOpex;
  const precoFinal = opexMargem + capexDiluido;

  const set = (s, t) => { const el = gi(s); if (el) el.textContent = t; };
  set('co-hw-sub-',      fmtBRL(hwSub));
  set('co-capex-total-', fmtBRL(capexTotal));
  set('co-capex-pp-',    fmtBRL(capexPorPonto));
  set('co-capex-dil-',   fmtBRL(capexDiluido) + '/mês');
  set('co-opex-total-',  fmtBRL(totalOpex) + '/mês');
  set('co-opex-marg-',   fmtBRL(opexMargem) + '/mês');
  set('co-final-',       fmtBRL(precoFinal) + '/mês');
  set('co-sub-',         `por ponto / mês — modelo de ${pts} pontos em ${mes} meses`);
}

const TL_STATUS = { done: 'Concluído', 'em-andamento': 'Em andamento', planejado: 'Planejado' };

function _fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
}
function _daysBetween(a, b) {
  if (!a || !b) return null;
  return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / 86400000);
}

function renderGestaoPanel(id) {
  const container = document.getElementById('gestao-panel-' + id);
  if (!container) return;
  const events = DATA[id].gestao || [];

  const items = events.length ? events.map((ev, i) => {
    const chain = [
      { data: ev.data, status: ev.status, titulo: ev.titulo, desc: ev.desc, obs: null, isOrig: true },
      ...(ev.avancos || []).map(a => ({ ...a, titulo: ev.titulo, isOrig: false }))
    ];
    const latestStatus = chain[chain.length - 1].status || 'planejado';
    const hasAvancos   = (ev.avancos || []).length > 0;

    const cards = chain.map((card, j) => {
      const isDimmed = j < chain.length - 1;
      const isLatest = j === chain.length - 1;
      const days     = j > 0 ? _daysBetween(chain[j-1].data, card.data) : null;
      return `
        <div class="timeline-card${isDimmed ? ' tl-dimmed' : ''}" style="${!isLatest ? 'margin-bottom:8px' : ''}">
          ${isLatest ? `<div class="timeline-actions">
            ${hasAvancos ? `<button class="tl-btn" onclick="reverterAvanco('${id}',${i})" title="Reverter">←</button>` : ''}
            <button class="tl-btn"        onclick="openAvancoForm('${id}',${i},'${chain[chain.length-1].data||''}')" title="Avançar">→</button>
            <button class="tl-btn"        onclick="editGestaoItem('${id}',${i})"  title="Editar">✏</button>
            <button class="tl-btn tl-del" onclick="delGestaoItem('${id}',${i})"   title="Excluir">×</button>
          </div>` : ''}
          ${card.data  ? `<div class="tl-date">${_fmtDate(card.data)}</div>` : ''}
          <div class="tl-title">${card.titulo || '—'}</div>
          ${card.isOrig && card.desc  ? `<div class="tl-desc">${card.desc}</div>`  : ''}
          ${!card.isOrig && card.obs  ? `<div class="tl-desc tl-obs">${card.obs}</div>` : ''}
          ${days !== null ? `<div class="tl-dias">${days} dia${days !== 1 ? 's' : ''} no status anterior</div>` : ''}
          <span class="tl-badge ${card.status || 'planejado'}">${TL_STATUS[card.status] || ''}</span>
        </div>`;
    }).join('');

    return `<div class="timeline-item" id="tl-item-${id}-${i}">
      <div class="timeline-dot ${latestStatus}"></div>
      ${cards}
    </div>`;
  }).join('')
  : `<p style="padding-left:48px;color:var(--text-mid);font-size:.75rem">Nenhum evento ainda.</p>`;

  container.innerHTML = `
    <div class="timeline-wrap">
      <div class="timeline" id="tl-${id}">${items}</div>
      <button class="gestao-add-btn" onclick="addGestaoItem('${id}')">+ Adicionar evento</button>
    </div>`;
}

/* ---- Coverflow de imagens ---- */
const tecCoverFlowIdx = {};

function renderCoverFlow(tabId, tecIdx) {
  const wrap = document.getElementById(`cflow-${tabId}-${tecIdx}`);
  if (!wrap) return;
  const tec = DATA[tabId].tecnologia[tecIdx];
  if (!tec) return;
  if (!tec.imagens) tec.imagens = [];
  const imgs = tec.imagens;
  const key  = `${tabId}-${tecIdx}`;
  const idx  = Math.max(0, Math.min(tecCoverFlowIdx[key] || 0, imgs.length - 1));
  tecCoverFlowIdx[key] = idx;

  const fileInput = `<input type="file" accept="image/*" id="cflow-input-${tabId}-${tecIdx}" style="display:none" onchange="onCoverFlowFile('${tabId}',${tecIdx},this)" multiple>`;

  if (!imgs.length) {
    wrap.innerHTML = `
      <div class="cflow-empty-state">
        <div style="font-size:1.6rem">🖼</div>
        <div>Sem imagens</div>
      </div>
      <div class="cflow-toolbar">
        <button class="cflow-tbtn" onclick="addCoverFlowImg('${tabId}',${tecIdx})">+ Imagem</button>
      </div>
      ${fileInput}`;
    return;
  }

  const txArr = [0, 290, 430, 520];
  const tzArr = [0, -60, -110, -150];
  const ryArr = [0,  42,   54,   62];
  const scArr = [1, .82,  .65,   .5];
  const opArr = [1, .74,  .50,  .28];

  const items = imgs.map((img, i) => {
    const off = i - idx;
    const abs = Math.abs(off);
    if (abs > 3) return '';
    const tx = off >= 0 ? txArr[abs] : -txArr[abs];
    const tz = tzArr[abs];
    const ry = off > 0 ? -ryArr[abs] : off < 0 ? ryArr[abs] : 0;
    const sc = scArr[abs];
    const op = opArr[abs];
    const z  = 10 - abs;
    const clickAction = abs === 0
      ? `openLightbox('${tabId}',${tecIdx},${i})`
      : `setCoverFlowIdx('${tabId}',${tecIdx},${i})`;
    return `<div class="cflow-item" style="transform:translateX(calc(-50% + ${tx}px)) translateY(-50%) translateZ(${tz}px) rotateY(${ry}deg) scale(${sc});opacity:${op};z-index:${z};${abs===0?'cursor:zoom-in':''}" onclick="${clickAction}">
      <img src="${img.src}" alt="${img.caption||''}">
    </div>`;
  }).join('');

  const dots = imgs.map((_, i) =>
    `<div class="cflow-dot${i===idx?' active':''}" onclick="setCoverFlowIdx('${tabId}',${tecIdx},${i})"></div>`
  ).join('');

  const caption = imgs[idx]?.caption || '';

  wrap.innerHTML = `
    <div class="cflow-stage">${items}</div>
    ${idx > 0             ? `<button class="cflow-nav cflow-nav-l" onclick="setCoverFlowIdx('${tabId}',${tecIdx},${idx-1})">‹</button>` : ''}
    ${idx < imgs.length-1 ? `<button class="cflow-nav cflow-nav-r" onclick="setCoverFlowIdx('${tabId}',${tecIdx},${idx+1})">›</button>` : ''}
    ${caption ? `<div class="cflow-caption">${caption}</div>` : ''}
    <div class="cflow-dots">${dots}</div>
    <div class="cflow-toolbar">
      <button class="cflow-tbtn del" onclick="delCoverFlowImg('${tabId}',${tecIdx},${idx})">× Remover</button>
      <button class="cflow-tbtn" onclick="addCoverFlowImg('${tabId}',${tecIdx})">+ Adicionar</button>
    </div>
    ${fileInput}`;
}

function setCoverFlowIdx(tabId, tecIdx, i) {
  tecCoverFlowIdx[`${tabId}-${tecIdx}`] = i;
  renderCoverFlow(tabId, tecIdx);
}

function addCoverFlowImg(tabId, tecIdx) {
  document.getElementById(`cflow-input-${tabId}-${tecIdx}`)?.click();
}

function onCoverFlowFile(tabId, tecIdx, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const tec = DATA[tabId].tecnologia[tecIdx];
  if (!tec.imagens) tec.imagens = [];
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const imgEl = new Image();
      imgEl.onload = () => {
        const MAX = 900;
        let w = imgEl.width, h = imgEl.height;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(imgEl, 0, 0, w, h);
        tec.imagens.push({ src: canvas.toDataURL('image/jpeg', 0.82), caption: '' });
        done++;
        if (done === files.length) {
          tecCoverFlowIdx[`${tabId}-${tecIdx}`] = tec.imagens.length - 1;
          persistData(tabId);
          renderCoverFlow(tabId, tecIdx);
        }
      };
      imgEl.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function delCoverFlowImg(tabId, tecIdx, imgIdx) {
  showConfirm('Remover imagem?', 'Esta ação não pode ser desfeita.', () => {
    DATA[tabId].tecnologia[tecIdx].imagens.splice(imgIdx, 1);
    tecCoverFlowIdx[`${tabId}-${tecIdx}`] = Math.max(0, imgIdx - 1);
    persistData(tabId);
    renderCoverFlow(tabId, tecIdx);
  });
}

function showConfirm(title, message, onOk) {
  const ov = document.createElement('div');
  ov.className = 'confirm-overlay';
  ov.innerHTML = `
    <div class="confirm-box">
      <h4>${title}</h4>
      <p>${message}</p>
      <div class="confirm-actions">
        <button class="confirm-cancel">Cancelar</button>
        <button class="confirm-ok">Remover</button>
      </div>
    </div>`;
  ov.querySelector('.confirm-cancel').onclick = () => ov.remove();
  ov.querySelector('.confirm-ok').onclick = () => { ov.remove(); onOk(); };
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  const onKey = e => { if (e.key === 'Escape') { ov.remove(); document.removeEventListener('keydown', onKey); } };
  document.addEventListener('keydown', onKey);
  document.body.appendChild(ov);
}

function openLightbox(tabId, tecIdx, imgIdx) {
  const src = DATA[tabId].tecnologia[tecIdx]?.imagens[imgIdx]?.src;
  if (!src) return;
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.innerHTML = `<img src="${src}"><button class="lightbox-close" title="Fechar">×</button>`;
  lb.querySelector('.lightbox-close').onclick = () => lb.remove();
  lb.onclick = e => { if (e.target === lb) lb.remove(); };
  const onKey = e => { if (e.key === 'Escape') { lb.remove(); document.removeEventListener('keydown', onKey); } };
  document.addEventListener('keydown', onKey);
  document.body.appendChild(lb);
}

/* ---- Sub-abas ---- */
const activeSubTab = {};

function activateSubTab(tabId, subId) {
  activeSubTab[tabId] = subId;
  document.querySelectorAll(`#subtab-bar-${tabId} .subtab-btn`).forEach(b =>
    b.classList.toggle('active', b.dataset.subtab === subId));

    p.classList.toggle('active', p.dataset.subtab === subId));

/* ---- Ordenação de abas ---- */
let _tabSortOrder = null;

function scrollTabBar(dir) {
  const el = document.getElementById('tab-bar-scroll');
  if (el) el.scrollBy({ left: dir * 160, behavior: 'smooth' });
}

function openTabSort() {
  _tabSortOrder = [...TABS];
  _renderSortList();
  document.getElementById('tab-sort-overlay').classList.add('open');
  document.getElementById('tab-sort-panel').style.display = 'block';
}

function _renderSortList() {
  const list = document.getElementById('tab-sort-list');
  list.innerHTML = _tabSortOrder.map((t, i) => `
    <div class="tab-sort-item" draggable="true" data-idx="${i}">
      <span class="tab-sort-handle">⠿</span>
      <span class="tab-sort-num">${i + 1}</span>
      <span style="flex:1">${t.label}</span>
    </div>`).join('');
  let dragIdx = null;
  const clearIndicators = () => list.querySelectorAll('.tab-sort-item').forEach(el => el.classList.remove('drop-before','drop-after'));
  list.querySelectorAll('.tab-sort-item').forEach(el => {
    el.addEventListener('dragstart', () => { dragIdx = +el.dataset.idx; setTimeout(() => el.classList.add('dragging'), 0); });
    el.addEventListener('dragend',   () => { el.classList.remove('dragging'); clearIndicators(); });
    el.addEventListener('dragover',  e => {
      e.preventDefault();
      clearIndicators();
      const mid = el.getBoundingClientRect().top + el.offsetHeight / 2;
      el.classList.add(e.clientY < mid ? 'drop-before' : 'drop-after');
    });
    el.addEventListener('dragleave', clearIndicators);
    el.addEventListener('drop', e => {
      e.preventDefault(); clearIndicators();
      const hoverIdx = +el.dataset.idx;
      const mid = el.getBoundingClientRect().top + el.offsetHeight / 2;
      let insertAt = e.clientY < mid ? hoverIdx : hoverIdx + 1;
      if (dragIdx < insertAt) insertAt--;
      if (dragIdx === insertAt) return;
      const [moved] = _tabSortOrder.splice(dragIdx, 1);
      _tabSortOrder.splice(insertAt, 0, moved);
      _renderSortList();
    });
  });
}

async function closeTabSort(save) {
  document.getElementById('tab-sort-overlay').classList.remove('open');
  document.getElementById('tab-sort-panel').style.display = 'none';
  if (save && _tabSortOrder) {
    TABS = _tabSortOrder;
    renderTabBar();
    try {
      await fetch('/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: '__tabs__', data: TABS }),
      });
    } catch(e) { console.warn('Erro ao salvar ordem das abas:', e); }
  }
  _tabSortOrder = null;
}

/* ---- persistData(id) — salva só a aba que foi editada ---- */
async function persistData(id) {
  try {
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, data: DATA[id] }),
    });
  } catch (e) {
    console.warn('Erro ao persistir dados:', e);
  }
}

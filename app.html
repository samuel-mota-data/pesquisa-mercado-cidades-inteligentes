<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estudo de Mercado — Dispositivos Inteligentes | Unifique</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* =============================================
       CORES E VARIÁVEIS — edite aqui para rebranding
       ============================================= */
    :root {
      --blue-dark:   #1a2b8c;
      --blue-mid:    #2540c0;
      --teal:        #00c8d4;
      --green-light: #a8e063;
      --yellow:      #f5c842;
      --white:       #ffffff;
      --gray-light:  #f4f6fb;
      --gray-mid:    #dde3f0;
      --text-dark:   #1a2340;
      --text-mid:    #3a4a6b;
      --red-risk:    #e03c3c;
      --card-shadow: 0 4px 24px rgba(26,43,140,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--gray-light);
      color: var(--text-dark);
      line-height: 1.5;
      font-size: 13px;
    }

    /* ---- HEADER ---- */
    header {
      background: linear-gradient(135deg, var(--blue-dark) 60%, var(--blue-mid));
      color: var(--white);
      padding: 18px 24px 16px;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--green-light));
    }
    .header-inner { max-width: 1100px; margin: 0 auto; }
    .brand { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 4px; }
    header h1 { font-size: 1.1rem; font-weight: 700; line-height: 1.2; }
    header p  { margin-top: 4px; opacity: .75; font-size: .75rem; }

    /* ---- LAYOUT ---- */
    main { max-width: 1100px; margin: 0 auto; padding: 16px 14px 36px; }

    .section { margin-bottom: 22px; }
    .section-title {
      font-size: .82rem; font-weight: 700; color: var(--blue-dark);
      padding-bottom: 5px;
      border-bottom: 2px solid var(--teal);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-title .badge {
      background: var(--teal); color: var(--white);
      font-size: .6rem; font-weight: 700; letter-spacing: 1px;
      padding: 2px 7px; border-radius: 99px; text-transform: uppercase;
    }

    /* ---- CARDS GRID ---- */
    .cards { display: grid; gap: 8px; }
    .cards-3 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .cards-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .cards-4 { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }

    .card {
      background: var(--white);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: var(--card-shadow);
      border-top: 3px solid var(--teal);
    }
    .card h3 { font-size: .72rem; color: var(--blue-dark); margin-bottom: 3px; }
    .card .big-num {
      font-size: 1.15rem; font-weight: 800; color: var(--blue-mid);
      line-height: 1;
    }
    .card .sub { font-size: .65rem; color: var(--text-mid); margin-top: 2px; }
    .card .delta {
      display: inline-block; margin-top: 4px;
      background: rgba(0,200,212,.12); color: #008a92;
      font-size: .62rem; font-weight: 700; padding: 2px 6px; border-radius: 99px;
    }

    .card.yellow  { border-top-color: var(--yellow); }
    .card.green   { border-top-color: var(--green-light); }
    .card.red     { border-top-color: var(--red-risk); }
    .card.dark    { background: var(--blue-dark); color: var(--white); border-top-color: var(--teal); }
    .card.dark h3 { color: var(--teal); }
    .card.dark .big-num { color: var(--white); }
    .card.dark .sub { color: rgba(255,255,255,.6); }

    /* ---- TABLE ---- */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      background: var(--white); border-radius: 8px;
      overflow: hidden; box-shadow: var(--card-shadow);
    }
    thead tr { background: var(--blue-dark); color: var(--white); }
    thead th { padding: 7px 10px; text-align: left; font-size: .68rem; letter-spacing: .5px; }
    tbody tr:nth-child(even) { background: var(--gray-light); }
    tbody td { padding: 6px 10px; font-size: .72rem; color: var(--text-dark); }
    tbody tr:hover { background: rgba(0,200,212,.07); }
    .highlight-row { background: rgba(245,200,66,.15) !important; font-weight: 700; }

    /* ---- PROGRESS BARS ---- */
    .progress-list { display: flex; flex-direction: column; gap: 6px; }
    .progress-item label {
      font-size: .65rem; font-weight: 600; color: var(--text-mid);
      display: flex; justify-content: space-between; margin-bottom: 2px;
    }
    .progress-track {
      height: 5px; background: var(--gray-mid); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--teal), var(--green-light));
      transition: width .6s ease;
    }
    .progress-fill.red  { background: linear-gradient(90deg, #e03c3c, #ff7070); }
    .progress-fill.yellow { background: linear-gradient(90deg, var(--yellow), #ffe08a); }

    /* ---- BRASIL KPI GRID ---- */
    .brasil-kpis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 6px;
    }
    .brasil-kpi {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brasil-kpi-icon { font-size: 1.1rem; line-height: 1; margin-bottom: 2px; }
    .brasil-kpi-val  { font-size: 1.15rem; font-weight: 700; color: var(--teal); line-height: 1.1; }
    .brasil-kpi-label { font-size: .62rem; color: var(--text-mid); line-height: 1.3; }
    .brasil-kpi-src { font-size: .58rem; color: rgba(255,255,255,.3); margin-top: 3px; }
    .brasil-kpi-src a { color: var(--teal); opacity: .7; text-decoration: none; }
    .brasil-kpi-src a:hover { opacity: 1; }

    /* ---- PARCEIROS ---- */
    .parc-filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .parc-search  { flex: 1; min-width: 160px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--gray-mid); font-size: .78rem; background: var(--white); color: var(--blue-dark); }
    .parc-vfilter { padding: 7px 10px; border-radius: 6px; border: 1px solid var(--gray-mid); font-size: .78rem; background: var(--white); color: var(--blue-dark); }
    .parc-count   { font-size: .68rem; color: var(--text-mid); margin-left: auto; align-self: center; }
    .parc-list    { display: flex; flex-direction: column; gap: 4px; }
    .parc-row     { background: var(--white); border-radius: 8px; box-shadow: var(--card-shadow); overflow: hidden; cursor: pointer; transition: box-shadow .15s; }
    .parc-row:hover { box-shadow: 0 4px 18px rgba(0,0,0,.1); }
    .parc-row-main { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
    .parc-nome    { font-size: .8rem; font-weight: 700; color: var(--blue-dark); min-width: 140px; flex-shrink: 0; }
    .parc-sub     { font-size: .7rem; color: var(--text-mid); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .parc-loc     { font-size: .68rem; color: var(--text-mid); white-space: nowrap; flex-shrink: 0; }
    .parc-badge-sim   { background: rgba(0,200,212,.12); color: var(--teal); border: 1px solid rgba(0,200,212,.25); border-radius: 20px; padding: 2px 7px; font-size: .58rem; white-space: nowrap; flex-shrink: 0; }
    .parc-badge-fat   { background: rgba(168,224,99,.12); color: var(--green-light); border: 1px solid rgba(168,224,99,.3); border-radius: 20px; padding: 2px 7px; font-size: .58rem; white-space: nowrap; flex-shrink: 0; }
    .parc-chevron { font-size: .65rem; color: var(--text-mid); flex-shrink: 0; transition: transform .2s; margin-left: 4px; }
    .parc-row.open .parc-chevron { transform: rotate(180deg); }
    .parc-detail  { display: none; padding: 0 14px 14px; border-top: 1px solid var(--gray-mid); }
    .parc-row.open .parc-detail { display: block; }
    .parc-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .parc-field   { display: flex; flex-direction: column; gap: 2px; }
    .parc-field-label { font-size: .58rem; text-transform: uppercase; letter-spacing: .04em; color: var(--text-mid); }
    .parc-field-val   { font-size: .75rem; color: var(--blue-dark); line-height: 1.4; }
    .parc-desc    { font-size: .75rem; color: var(--blue-dark); line-height: 1.6; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--gray-mid); }
    .parc-status-potencial   { background: rgba(100,120,180,.15); color: #8899cc; border: 1px solid rgba(100,120,180,.25); }
    .parc-status-negociacao  { background: rgba(245,200,66,.15);  color: var(--yellow); border: 1px solid rgba(245,200,66,.3); }
    .parc-status-ativo       { background: rgba(0,200,212,.12);   color: var(--teal);   border: 1px solid rgba(0,200,212,.25); }
    .parc-status-estrategico { background: rgba(168,224,99,.12);  color: var(--green-light); border: 1px solid rgba(168,224,99,.3); }
    .parc-add-btn { margin-top: 10px; }

    /* ---- OPEX TABLE ---- */
    .opex-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .opex-box {
      background: var(--white); border-radius: 8px;
      padding: 10px 12px; box-shadow: var(--card-shadow);
    }
    .opex-box h4 { font-size: .65rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--teal); margin-bottom: 7px; }
    .opex-line {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0; border-bottom: 1px solid var(--gray-mid);
      font-size: .72rem;
    }
    .opex-line:last-child { border-bottom: none; }
    .opex-line .lbl { color: var(--text-mid); }
    .opex-line .val { font-weight: 700; color: var(--blue-dark); }
    .opex-total {
      margin-top: 6px; padding: 7px 10px;
      background: var(--blue-dark); color: var(--white);
      border-radius: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .opex-total .lbl { font-size: .65rem; }
    .opex-total .val { font-size: .88rem; font-weight: 800; color: var(--teal); }

    /* ---- CALCULADORA ---- */
    .calc-input {
      width: 88px; text-align: right; flex-shrink: 0;
      border: none; border-radius: 0;
      padding: 0; font-size: .72rem; font-weight: 700;
      font-family: inherit; color: var(--blue-dark);
      background: transparent;
    }
    .calc-editing .calc-input {
      border: 1px solid var(--gray-mid); border-radius: 4px;
      padding: 2px 6px; background: var(--gray-light);
    }
    .calc-input:focus { outline: none; border-color: var(--teal); background: #fff; }
    .calc-input.lbl-input {
      width: auto; flex: 1; text-align: left; font-weight: 400;
      margin-right: 6px; color: var(--text-mid);
    }
    .calc-output { font-weight: 700; color: var(--blue-dark); font-size: .72rem; }

    .op-badge {
      width: 18px; height: 18px; flex-shrink: 0; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 900; margin-right: 6px;
    }
    .op-add { background: rgba(0,200,212,.15); color: #007a82; }
    .op-sub { background: rgba(224,60,60,.13); color: #b02020; }
    .op-mul { background: rgba(37,64,192,.15); color: var(--blue-mid); }
    .op-div { background: rgba(245,200,66,.28); color: #8a6e00; }
    .op-pct { background: rgba(168,224,99,.28); color: #4a7a00; }
    .op-clickable { cursor: pointer; user-select: none; }
    .op-clickable:hover { filter: brightness(.85); }

    .calc-hint { font-size: .6rem; color: #bbc; margin: 0 4px; flex-shrink: 0; }

    .calc-del {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: .85rem; padding: 0 3px; line-height: 1;
      flex-shrink: 0; margin-left: 4px; width: 20px; text-align: center;
      display: none;
    }
    .calc-del:hover { color: var(--red-risk); }
    .calc-del-spacer { display: none; width: 20px; margin-left: 4px; flex-shrink: 0; }

    .op-clickable { display: none; }
    .calc-add-btn { display: none; }

    .calc-editing .op-clickable  { display: inline-flex; }
    .calc-editing .calc-del      { display: inline-flex; align-items: center; justify-content: center; }
    .calc-editing .calc-del-spacer { display: inline-block; }
    .calc-editing .calc-add-btn  { display: block; }

    .calc-add-btn {
      width: 100%; margin-top: 8px; border-radius: 5px;
      background: none; border: 1px dashed var(--gray-mid);
      padding: 5px 8px; cursor: pointer; font-family: inherit;
      font-size: .65rem; color: var(--text-mid);
    }
    .calc-add-btn:hover { border-color: var(--teal); color: var(--teal); }

    .calc-edit-toggle {
      border: 1px solid var(--gray-mid); border-radius: 4px; cursor: pointer;
      font-size: .62rem; font-weight: 600; font-family: inherit;
      padding: 2px 8px; background: none; color: var(--text-mid); margin-left: 8px;
    }
    .calc-edit-toggle:hover  { border-color: var(--teal); color: var(--teal); }
    .calc-edit-toggle.active { background: var(--teal); color: #fff; border-color: var(--teal); }

    .calc-action-btn {
      border: none; border-radius: 4px; cursor: pointer;
      font-size: .62rem; font-weight: 700; font-family: inherit;
      padding: 3px 8px; line-height: 1.4;
    }
    .calc-action-btn.save    { background: var(--teal); color: #fff; }
    .calc-action-btn.save:hover { background: #009aa2; }
    .calc-action-btn.discard { background: var(--gray-mid); color: var(--text-mid); }
    .calc-action-btn.discard:hover { background: #c8cedc; }

    /* ---- DIFF PILLS ---- */
    .diff-list { display: flex; flex-direction: column; gap: 8px; }
    .diff-item {
      display: flex; align-items: flex-start; gap: 8px;
      background: var(--white); border-radius: 8px;
      padding: 9px 11px; box-shadow: var(--card-shadow);
    }
    .diff-body { flex: 1; }
    .diff-body h4 { font-size: .75rem; font-weight: 700; color: var(--blue-dark); }
    .diff-body p  { font-size: .68rem; color: var(--text-mid); margin-top: 2px; }
    .diff-edit { display: none; flex-direction: column; gap: 3px; }
    .diff-edit-input {
      background: #f3f5fa; border: 1px solid var(--gray-mid); border-radius: 4px;
      color: var(--blue-dark); font-size: .72rem; padding: 3px 6px;
      width: 100%; box-sizing: border-box; font-family: inherit;
    }
    .diff-del {
      background: none; border: none; color: var(--gray-mid); font-size: .9rem;
      cursor: pointer; padding: 0 3px; flex-shrink: 0; align-self: center;
      display: none; line-height: 1;
    }
    .diff-del:hover { color: var(--red-risk); }
    .diff-add-btn {
      display: none; margin-top: 6px; font-size: .68rem; color: var(--teal);
      background: none; border: 1px dashed var(--teal); border-radius: 6px;
      padding: 5px 10px; cursor: pointer; width: 100%; font-family: inherit;
    }
    .diff-add-btn:hover { background: rgba(0,161,168,.06); }
    .diff-editing .diff-view     { display: none; }
    .diff-editing .diff-edit     { display: flex; }
    .diff-editing .diff-del      { display: inline-flex; }
    .diff-editing .diff-add-btn  { display: block; }

    /* ---- CONC EDIT MODE ---- */
    .conc-view { display: inline; }
    .conc-edit { display: none; }
    .conc-del-col { display: none; }
    .conc-add-btn {
      display: none; margin-top: 6px; font-size: .68rem; color: var(--teal);
      background: none; border: 1px dashed var(--teal); border-radius: 6px;
      padding: 5px 10px; cursor: pointer; width: 100%; font-family: inherit;
    }
    .conc-add-btn:hover { background: rgba(0,161,168,.06); }
    .conc-editing .conc-view    { display: none; }
    .conc-editing .conc-edit    { display: inline-block; box-sizing: border-box; }
    .conc-editing .conc-del-col { display: table-cell; }
    .conc-editing .conc-add-btn { display: block; }
    .conc-edit-input {
      background: #f3f5fa; border: 1px solid var(--gray-mid); border-radius: 4px;
      color: var(--blue-dark); font-size: .72rem; padding: 3px 6px;
      width: 100%; font-family: inherit;
    }
    .conc-select-nivel {
      background: #f3f5fa; border: 1px solid var(--gray-mid); border-radius: 4px;
      color: var(--blue-dark); font-size: .72rem; padding: 2px 4px; font-family: inherit;
    }
    .conc-del-btn {
      background: none; border: none; color: var(--gray-mid); cursor: pointer;
      font-size: .9rem; padding: 0 3px; line-height: 1;
    }
    .conc-del-btn:hover { color: var(--red-risk); }
    .conc-nota-ta {
      display: none; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.25);
      border-radius: 4px; color: rgba(255,255,255,.85); font-size: .78rem;
      padding: 7px 9px; width: 100%; box-sizing: border-box;
      min-height: 90px; resize: vertical; line-height: 1.6; font-family: inherit;
    }
    .conc-editing .conc-nota-ta { display: block; }

    /* ---- UPLINKS & FONTES ---- */
    .uplink {
      color: var(--teal); font-size: .6rem; text-decoration: none;
      opacity: .7; margin-left: 3px; vertical-align: super;
    }
    .uplink:hover { opacity: 1; }
    .fontes-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
      margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--gray-light);
    }
    .fonte-label { font-size: .6rem; color: var(--text-mid); margin-right: 2px; }
    .fonte-pill {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: .62rem; color: var(--text-mid); text-decoration: none;
      border: 1px solid var(--gray-mid); border-radius: 20px;
      padding: 2px 8px; transition: border-color .15s, color .15s;
    }
    .fonte-pill:hover { border-color: var(--teal); color: var(--teal); }

    /* ---- SECTION 1 / 2 EDIT MODE ---- */
    .sec1-edit, .sec2-edit { display: none; }
    .sec1-editing .sec1-view { display: none; }
    .sec1-editing .sec1-edit { display: block; }
    .sec2-editing .sec2-view { display: none; }
    .sec2-editing .sec2-edit { display: block; }
    .sec-edit-subtitle {
      font-size: .62rem; font-weight: 700; color: var(--text-mid);
      margin: 10px 0 5px; text-transform: uppercase; letter-spacing: .05em;
    }
    .sec-edit-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px;
    }
    .sec-edit-grid label {
      font-size: .65rem; color: var(--text-mid); display: flex; flex-direction: column; gap: 3px;
    }
    .sec-edit-input {
      background: var(--white); border: 1px solid var(--gray-mid); border-radius: 4px;
      color: var(--blue-dark); font-size: .72rem; padding: 3px 6px;
      font-family: inherit; width: 100%; box-sizing: border-box;
    }
    .sec-url-input {
      background: #f3f5fa; border: 1px dashed #8fa0c0; border-radius: 4px;
      color: var(--blue-dark); font-size: .65rem; padding: 2px 5px;
      font-family: inherit; flex: 1.5; min-width: 0;
    }
    .sec-url-input:focus { border-color: var(--teal); outline: none; background: #fff; }
    .sec-url-input::placeholder { color: #8fa0c0; }
    .sec-row-edit {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border-radius: 6px; padding: 5px 8px; margin-bottom: 4px;
    }
    .sec-row-del {
      background: none; border: none; color: var(--gray-mid); font-size: .9rem;
      cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0;
    }
    .sec-row-del:hover { color: var(--red-risk); }
    .sec-add-btn {
      font-size: .65rem; color: var(--teal); background: none;
      border: 1px dashed var(--teal); border-radius: 5px;
      padding: 4px 10px; cursor: pointer; font-family: inherit; width: 100%; margin-top: 2px;
    }
    .sec-add-btn:hover { background: rgba(0,161,168,.06); }
    .sec-card-edit-block {
      background: var(--bg); border-radius: 8px; padding: 8px 10px;
      margin-bottom: 6px; border-left: 3px solid var(--gray-mid);
    }
    .sec-card-edit-row {
      display: flex; gap: 6px; margin-bottom: 4px;
    }
    .sec-card-edit-row label {
      font-size: .65rem; color: var(--text-mid); display: flex; flex-direction: column; gap: 2px;
    }

    /* ---- RISK TABLE ---- */
    .risk-impact { font-weight: 700; color: var(--red-risk); }

    /* ---- FOOTER ---- */
    footer {
      text-align: center; padding: 16px 20px;
      font-size: .65rem; color: #aab; border-top: 1px solid var(--gray-mid);
    }

    /* ---- CHART WRAPPER ---- */
    .chart-wrap {
      background: var(--white); border-radius: 8px;
      padding: 12px; box-shadow: var(--card-shadow);
    }
    .chart-wrap canvas { max-height: 160px; }

    /* ---- TABS ---- */
    .tab-bar {
      background: var(--blue-dark);
      border-bottom: 2px solid var(--teal);
    }
    .tab-bar-center {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: stretch;
    }
    .tab-sort-btn {
      flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.45);
      font-size: .65rem; line-height: 1;
      width: 32px;
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid rgba(255,255,255,.1);
      transition: color .15s;
      font-family: inherit;
    }
    .tab-sort-btn::after { content: '▾'; font-size: .85rem; }
    .tab-sort-btn:hover { color: var(--teal); }
    .tab-nav-btn {
      flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.45);
      font-size: 1rem; line-height: 1;
      width: 28px;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s;
      font-family: inherit;
    }
    .tab-nav-btn:hover { color: var(--teal); }
    .tab-nav-btn:first-child { border-right: 1px solid rgba(255,255,255,.1); }
    .tab-nav-btn:last-child  { border-left:  1px solid rgba(255,255,255,.1); }
    .tab-bar-scroll {
      flex: 1; overflow-x: auto;
      scrollbar-width: none; white-space: nowrap;
    }
    .tab-bar-scroll::-webkit-scrollbar { display: none; }
    .tab-bar-inner {
      display: flex; gap: 0;
      padding: 0 14px;
    }
    /* modais genéricos */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(10,20,60,.55); backdrop-filter: blur(2px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white); border-radius: 12px;
      padding: 24px 28px; width: 560px; max-width: 94vw;
      box-shadow: 0 12px 48px rgba(10,20,60,.3);
      max-height: 88vh; overflow-y: auto;
    }
    .modal-box h4 { font-size: .9rem; font-weight: 700; color: var(--blue-dark); margin-bottom: 14px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-field { display: flex; flex-direction: column; gap: 3px; }
    .modal-field.full { grid-column: 1 / -1; }
    .modal-field label { font-size: .6rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-mid); }
    .modal-field input, .modal-field select, .modal-field textarea {
      padding: 7px 9px; border-radius: 6px; border: 1px solid var(--gray-mid);
      font-size: .78rem; color: var(--blue-dark); background: var(--white); font-family: inherit;
    }
    .modal-field textarea { resize: vertical; min-height: 70px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    /* confirm modal */
    .confirm-box {
      background: var(--white); border-radius: 12px; padding: 28px;
      width: 360px; max-width: 92vw; box-shadow: 0 12px 48px rgba(10,20,60,.3); text-align: center;
    }
    .confirm-box p { font-size: .82rem; color: var(--blue-dark); margin: 8px 0 20px; line-height: 1.5; }
    .confirm-box strong { color: #c0392b; }
    /* modal de ordenação */
    .tab-sort-overlay {
      display: none; position: fixed; inset: 0; z-index: 900;
    }
    .tab-sort-overlay.open { display: block; }
    .tab-sort-panel {
      position: fixed; top: 78px; left: 0;
      background: var(--white); border-radius: 0 8px 8px 0;
      padding: 14px 16px; min-width: 270px;
      box-shadow: 6px 6px 28px rgba(26,43,140,.22);
      z-index: 901;
    }
    .tab-sort-panel h4 {
      font-size: .7rem; color: var(--text-mid); font-weight: 600;
      letter-spacing: .5px; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .tab-sort-list-wrap { display: flex; flex-direction: column; gap: 0; }
    .tab-sort-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 5px;
      cursor: grab; font-size: .73rem; color: var(--text-dark);
      background: var(--gray-light);
      border-top: 2px solid transparent;
      border-bottom: 2px solid transparent;
      margin-bottom: 2px;
      user-select: none; transition: background .1s;
    }
    .tab-sort-item:hover { background: var(--gray-mid); }
    .tab-sort-item.dragging { opacity: .25; }
    .tab-sort-item.drop-before { border-top-color: var(--teal); }
    .tab-sort-item.drop-after  { border-bottom-color: var(--teal); }
    .tab-sort-handle { color: #b0bcd4; font-size: .9rem; flex-shrink: 0; }
    .tab-sort-num {
      font-size: .6rem; font-weight: 700; color: var(--text-mid);
      background: var(--gray-mid); border-radius: 3px;
      padding: 1px 5px; flex-shrink: 0; min-width: 18px; text-align: center;
    }
    .tab-sort-footer {
      display: flex; justify-content: flex-end; gap: 6px;
      margin-top: 12px; padding-top: 10px;
      border-top: 1px solid var(--gray-mid);
    }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.55);
      font-size: .7rem; font-weight: 600;
      padding: 9px 14px;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
      font-family: inherit;
    }
    .tab-btn:hover { color: rgba(255,255,255,.85); }
    .tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

    /* ---- TAB PANELS ---- */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ---- SUB-ABAS ---- */
    .subtab-bar {
      background: var(--white);
      border-bottom: 1px solid var(--gray-mid);
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 2px 8px rgba(26,43,140,.05);
    }
    .subtab-bar-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; padding: 0 14px;
    }
    .subtab-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-mid); font-family: inherit;
      font-size: .72rem; font-weight: 600;
      padding: 8px 14px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .subtab-btn:hover { color: var(--blue-dark); }
    .subtab-btn.active { color: var(--blue-dark); border-bottom-color: var(--blue-mid); }
    .subtab-panel { display: none; }
    .subtab-panel.active { display: block; }
    .subtab-empty {
      max-width: 1100px; margin: 56px auto;
      text-align: center; padding: 20px;
      color: var(--text-mid); font-size: .78rem;
    }

    /* ---- VISÃO GERAL — estilo notebook/Notion ---- */
    .info-page {
      max-width: 720px; margin: 0 auto; padding: 36px 28px 64px;
      background: var(--white); min-height: 100%;
    }
    /* Título da página */
    .info-page-title {
      font-size: 1.9rem; font-weight: 800; color: var(--text-dark);
      line-height: 1.2; margin-bottom: 6px; letter-spacing: -.5px;
    }
    .info-page-sub {
      font-size: .75rem; color: var(--text-mid); margin-bottom: 28px;
      display: flex; align-items: center; gap: 10px;
    }
    .info-page-sub::after {
      content: ''; flex: 1; height: 1px; background: var(--gray-mid);
    }
    /* Propriedades — tabela estilo Notion */
    .info-props { margin-bottom: 32px; }
    .info-prop {
      display: grid; grid-template-columns: 160px 1fr;
      align-items: baseline; padding: 6px 0;
      border-bottom: 1px solid var(--gray-light);
      font-size: .82rem;
    }
    .info-prop:first-child { border-top: 1px solid var(--gray-light); }
    .info-prop-key { color: var(--text-mid); font-weight: 600; }
    .info-prop-val { color: var(--text-dark); font-weight: 500; }
    .info-prop-val strong { color: var(--blue-dark); }
    /* Bloco de texto editável */
    .info-body-block { margin-bottom: 32px; }
    .info-block-label {
      font-size: .68rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--teal);
      margin-bottom: 10px;
    }
    .info-pitch-view {
      font-size: .88rem; color: var(--text-dark); line-height: 1.75;
      white-space: pre-wrap; min-height: 40px; cursor: text;
      border-radius: 6px; padding: 10px 12px;
      border: 1.5px solid transparent; transition: border-color .15s;
    }
    .info-pitch-view:hover { border-color: var(--gray-mid); }
    .info-pitch-view.empty::before {
      content: 'Clique para adicionar uma descrição da solução…';
      color: #b0b8cc; font-style: italic;
    }
    .info-pitch-edit { display: none; }
    .info-pitch-edit textarea {
      width: 100%; min-height: 120px; padding: 10px 12px;
      border: 1.5px solid var(--teal); border-radius: 6px;
      font-family: inherit; font-size: .88rem; color: var(--text-dark);
      line-height: 1.75; resize: vertical; outline: none;
      background: #f9fbff;
    }
    .info-edit-actions { display: flex; gap: 8px; margin-top: 8px; }
    .info-btn-save, .info-btn-cancel {
      border: none; font-family: inherit; font-size: .72rem; font-weight: 700;
      padding: 5px 16px; border-radius: 6px; cursor: pointer;
    }
    .info-btn-save   { background: var(--teal); color: var(--white); }
    .info-btn-cancel { background: var(--gray-light); color: var(--text-mid); }
    /* Seções de conteúdo */
    .info-section { margin-bottom: 28px; }
    .info-section-title {
      font-size: .82rem; font-weight: 700; color: var(--blue-dark);
      padding-bottom: 6px; border-bottom: 2px solid var(--gray-mid);
      margin-bottom: 14px;
    }
    /* Lista de diferenciais */
    .info-dif-list { display: flex; flex-direction: column; gap: 10px; }
    .info-dif-item { display: flex; gap: 10px; align-items: flex-start; }
    .info-dif-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal); flex-shrink: 0; margin-top: 6px;
    }
    .info-dif-text { font-size: .84rem; color: var(--text-dark); line-height: 1.6; }
    .info-dif-name { font-weight: 700; }
    .info-dif-desc { color: var(--text-mid); }
    /* Riscos */
    .info-risk-list { display: flex; flex-direction: column; gap: 8px; }
    .info-risk-row { display: flex; gap: 10px; align-items: flex-start; font-size: .84rem; line-height: 1.55; }
    .info-risk-badge {
      font-size: .62rem; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      flex-shrink: 0; margin-top: 2px; letter-spacing: .3px;
    }
    .info-risk-badge.red    { background: #fde8e8; color: #c0392b; }
    .info-risk-badge.yellow { background: #fef3cd; color: #7d5a00; }
    .info-risk-badge.ok     { background: #e8f8f0; color: #1a6640; }
    .info-empty { font-size: .8rem; color: #b0b8cc; font-style: italic; }

    /* ---- NOTEBOOK — editor de blocos ---- */
    .nb-editor { outline: none; }
    .nb-block {
      position: relative; display: flex; align-items: flex-start;
      gap: 0; padding: 1px 0; border-radius: 4px;
      transition: background .1s;
    }
    .nb-block:hover { background: #f7f8fc; }
    .nb-block:hover .nb-handle { opacity: 1; }
    .nb-handle {
      opacity: 0; flex-shrink: 0; width: 28px; display: flex;
      flex-direction: column; align-items: center; gap: 1px;
      padding-top: 3px; cursor: pointer; transition: opacity .15s;
      position: relative;
    }
    .nb-handle-btn {
      background: none; border: none; cursor: pointer;
      color: #b0b8cc; font-size: .75rem; padding: 2px 4px;
      border-radius: 4px; line-height: 1; transition: background .1s, color .1s;
    }
    .nb-handle-btn:hover { background: var(--gray-mid); color: var(--text-dark); }
    /* Type dropdown */
    .nb-type-menu {
      position: absolute; left: 28px; top: 0; z-index: 500;
      background: var(--white); border: 1px solid var(--gray-mid);
      border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.12);
      padding: 4px; min-width: 160px; display: none;
    }
    .nb-type-menu.open { display: block; }
    .nb-type-opt {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: 5px; cursor: pointer; font-size: .78rem;
      color: var(--text-dark); white-space: nowrap;
    }
    .nb-type-opt:hover { background: var(--gray-light); }
    .nb-type-opt.active { color: var(--blue-dark); font-weight: 700; }
    .nb-type-icon { font-size: .9rem; width: 18px; text-align: center; flex-shrink: 0; }
    /* Content area */
    .nb-content { flex: 1; min-width: 0; padding: 3px 6px 3px 0; outline: none; }
    .nb-content[contenteditable=true]:empty::before {
      content: attr(data-ph); color: #c0c8d8; pointer-events: none;
    }
    /* Block type styles */
    .nb-h1 { font-size: 1.65rem; font-weight: 800; color: var(--text-dark); line-height: 1.2; padding-top: 18px; padding-bottom: 4px; }
    .nb-h2 { font-size: 1.2rem;  font-weight: 700; color: var(--text-dark); line-height: 1.25; padding-top: 14px; padding-bottom: 2px; }
    .nb-h3 { font-size: 1rem;    font-weight: 700; color: var(--text-mid);  line-height: 1.3;  padding-top: 10px; }
    .nb-p  { font-size: .88rem;  color: var(--text-dark); line-height: 1.75; }
    .nb-quote {
      font-size: .88rem; color: var(--text-mid); line-height: 1.7;
      border-left: 3px solid var(--teal); padding-left: 14px; font-style: italic;
    }
    .nb-bullet {
      font-size: .88rem; color: var(--text-dark); line-height: 1.7;
      padding-left: 4px;
    }
    .nb-bullet::before { content: '•'; color: var(--teal); font-weight: 900; margin-right: 8px; }
    .nb-divider-wrap { padding: 10px 0; width: 100%; }
    .nb-divider-wrap hr { border: none; border-top: 2px solid var(--gray-mid); }
    /* Image & Video blocks */
    .nb-media-block { width: 100%; }
    .nb-media-url-row { display: flex; gap: 8px; align-items: center; }
    .nb-media-url-row input {
      flex: 1; padding: 8px 10px; border: 1.5px solid var(--gray-mid);
      border-radius: 6px; font-family: inherit; font-size: .82rem; outline: none;
    }
    .nb-media-url-row input:focus { border-color: var(--teal); }
    .nb-media-url-row button {
      background: var(--teal); color: var(--white); border: none;
      padding: 8px 14px; border-radius: 6px; font-family: inherit;
      font-size: .78rem; font-weight: 700; cursor: pointer;
    }
    .nb-upload-btn {
      display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
      background: var(--gray-light); color: var(--text-mid);
      border: 1.5px solid var(--gray-mid); padding: 7px 12px;
      border-radius: 6px; font-family: inherit; font-size: .78rem;
      font-weight: 600; cursor: pointer; transition: border-color .15s, color .15s;
    }
    .nb-upload-btn:hover { border-color: var(--teal); color: var(--teal); }
    .nb-img-preview { margin-top: 8px; max-width: 100%; border-radius: 8px; display: block; }
    .nb-video-preview { margin-top: 8px; width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; }
    .nb-video-file { margin-top: 8px; width: 100%; border-radius: 8px; display: block; max-height: 400px; }
    /* Add block button */
    .nb-add-btn {
      display: flex; align-items: center; gap: 6px; margin-top: 12px;
      background: none; border: 1.5px dashed var(--gray-mid);
      color: var(--text-mid); font-family: inherit; font-size: .78rem;
      font-weight: 600; padding: 8px 16px; border-radius: 8px;
      cursor: pointer; width: 100%; transition: border-color .15s, color .15s;
    }
    .nb-add-btn:hover { border-color: var(--teal); color: var(--teal); }

    /* ---- TIMELINE / GESTÃO ---- */
    .timeline-wrap { max-width: 680px; margin: 0 auto; padding: 28px 14px 48px; }
    .timeline { position: relative; padding: 4px 0 4px 0; }
    .timeline::before {
      content: ''; position: absolute;
      left: 15px; top: 0; bottom: 0;
      width: 2px; background: var(--gray-mid);
    }
    .timeline-item { position: relative; padding-left: 48px; margin-bottom: 18px; }
    .timeline-dot {
      position: absolute; left: 7px; top: 13px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--white); border: 2px solid var(--gray-mid); z-index: 1;
      transition: border-color .15s, background .15s;
    }
    .timeline-dot.done        { background: var(--blue-dark); border-color: var(--blue-dark); }
    .timeline-dot.em-andamento { background: var(--teal);      border-color: var(--teal); }
    .timeline-dot.planejado   { background: var(--white);     border-color: #b0bcd4; }
    .timeline-card {
      background: var(--white); border-radius: 8px;
      padding: 12px 14px 10px;
      border: 1px solid var(--gray-mid);
      box-shadow: 0 1px 6px rgba(26,43,140,.06);
      position: relative;
    }
    .timeline-card:hover .timeline-actions { opacity: 1; }
    .timeline-actions {
      position: absolute; top: 8px; right: 8px;
      display: flex; gap: 2px; opacity: 0;
      transition: opacity .15s;
    }
    .tl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-mid); font-size: .7rem; font-family: inherit;
      padding: 3px 6px; border-radius: 4px;
      transition: color .1s, background .1s;
    }
    .tl-btn:hover           { background: var(--gray-light); color: var(--blue-dark); }
    .tl-btn.tl-del:hover    { color: var(--red-risk); }
    .tl-date  { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-mid); margin-bottom: 3px; }
    .tl-title { font-size: .8rem; font-weight: 700; color: var(--blue-dark); margin-bottom: 4px; }
    .tl-desc  { font-size: .71rem; color: var(--text-mid); line-height: 1.55; }
    .tl-badge {
      display: inline-block; margin-top: 7px;
      font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
      padding: 2px 8px; border-radius: 99px;
    }
    .tl-badge.done         { background: #eaecf7; color: var(--blue-dark); }
    .tl-badge.em-andamento { background: #e0fafb; color: #007070; }
    .tl-badge.planejado    { background: var(--gray-light); color: #7a8aaa; }
    .tl-dimmed { opacity: 0.4; }
    .tl-dias { font-size: .6rem; color: var(--text-mid); font-style: italic; margin: 4px 0 2px; }
    .tl-obs  { font-style: italic; color: var(--text-mid); }
    .gestao-add-btn {
      margin-left: 48px; margin-top: 4px;
      background: none; border: 1px dashed var(--gray-mid);
      color: var(--text-mid); font-family: inherit;
      font-size: .72rem; padding: 6px 14px; border-radius: 6px;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .gestao-add-btn:hover { border-color: var(--teal); color: var(--blue-dark); }

    /* --- Tecnologia --- */
    .tec-wrap  { max-width:1100px; margin:0 auto; padding:24px 16px 0; }
    .tec-grid  { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:16px; }
    @media(max-width:700px){ .tec-grid{ grid-template-columns:1fr; } }
    .tec-card  { background:var(--white); border-radius:10px; box-shadow:var(--card-shadow); border-top:4px solid var(--teal); padding:18px; }
    .tec-card-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .tec-card-title { font-size:.9rem; font-weight:800; color:var(--blue-dark); flex:1; line-height:1.3; }
    .tec-card-actions { display:flex; gap:2px; opacity:0; transition:opacity .15s; flex-shrink:0; }
    .tec-card:hover .tec-card-actions { opacity:1; }
    .tec-resumo { font-size:.73rem; color:var(--text-mid); line-height:1.6; margin-bottom:10px; }
    .tec-flow   { display:flex; flex-wrap:wrap; align-items:center; gap:4px; margin-bottom:12px; background:var(--gray-light); border-radius:6px; padding:7px 10px; }
    .tec-flow-step  { color:var(--blue-dark); font-size:.65rem; font-weight:700; font-family:monospace; }
    .tec-flow-arrow { color:var(--teal); font-size:.8rem; font-weight:700; }
    .tec-lists { display:grid; grid-template-columns:1fr 1fr; gap:8px 14px; margin-top:8px; }
    .tec-col-head { font-size:.58rem; font-weight:800; text-transform:uppercase; letter-spacing:.7px; margin-bottom:4px; }
    .tec-pros-head    { color:#0a8055; }
    .tec-contras-head { color:var(--red-risk); }
    .tec-usar-head    { color:#007a80; }
    .tec-evitar-head  { color:#8a6700; }
    .tec-ul { margin:0; padding:0; list-style:none; }
    .tec-li { font-size:.68rem; color:var(--text-mid); padding:1px 0 1px 13px; position:relative; line-height:1.5; }
    .tec-li::before { content:''; position:absolute; left:0; top:7px; width:5px; height:5px; border-radius:50%; }
    .tec-li-pros::before    { background:#0a8055; }
    .tec-li-contras::before { background:var(--red-risk); }
    .tec-li-usar::before    { background:#007a80; }
    .tec-li-evitar::before  { background:#8a6700; }
    .tec-li-empty { color:#bbb; font-style:italic; font-size:.65rem; padding-left:0; }
    .tec-li-empty::before { display:none; }

    /* --- Arquitetura --- */
    .arq-wrap { max-width:1100px; margin:0 auto; padding:24px 16px 32px; display:flex; flex-direction:column; gap:32px; }
    .arq-section-title { font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:var(--blue-dark); margin-bottom:14px; display:flex; align-items:center; gap:10px; }
    .arq-section-title::after { content:''; flex:1; height:1px; background:#dde3f0; }

    /* Camadas */
    .arq-camadas { display:flex; flex-direction:column; }
    .arq-layer { display:flex; align-items:flex-start; gap:0; border-radius:8px; overflow:hidden; background:var(--white); box-shadow:var(--card-shadow); }
    .arq-layer-accent { width:5px; flex-shrink:0; }
    .arq-layer-body { flex:1; padding:12px 14px; }
    .arq-layer-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .arq-layer-name { font-size:.78rem; font-weight:700; color:var(--blue-dark); flex:1; }
    .arq-chips { display:flex; flex-wrap:wrap; gap:6px; }
    .arq-chip { background:var(--gray-light); color:var(--text-dark); font-size:.68rem; font-weight:600; padding:3px 10px; border-radius:99px; display:flex; align-items:center; gap:5px; }
    .arq-chip-del { background:none; border:none; color:#aab; cursor:pointer; font-size:.75rem; line-height:1; padding:0; }
    .arq-chip-del:hover { color:var(--red-risk); }
    .arq-chip-add { background:none; border:1px dashed #c0c8dc; color:var(--text-mid); font-size:.65rem; padding:3px 9px; border-radius:99px; cursor:pointer; }
    .arq-chip-add:hover { border-color:var(--teal); color:var(--blue-dark); }
    .arq-layer-actions { display:flex; gap:2px; opacity:0; transition:opacity .15s; }
    .arq-layer:hover .arq-layer-actions { opacity:1; }

    /* Conector entre camadas */
    .arq-connector { display:flex; flex-direction:column; align-items:center; padding:2px 0; gap:2px; }
    .arq-connector-line { width:2px; height:10px; background:#dde3f0; }
    .arq-connector-body { display:flex; align-items:center; gap:6px; }
    .arq-connector-arrow { color:var(--teal); font-size:1.1rem; font-weight:700; line-height:1; }
    .arq-connector-proto { font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.4px; background:var(--gray-light); color:var(--text-mid); padding:2px 9px; border-radius:99px; }
    .arq-connector-edit { background:none; border:1px dashed #c0c8dc; color:var(--text-mid); font-size:.6rem; padding:2px 8px; border-radius:99px; cursor:pointer; font-family:inherit; }
    .arq-connector-edit:hover { border-color:var(--teal); color:var(--blue-dark); }
    .arq-connector-form { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }

    /* APIs table */
    .arq-table { width:100%; border-collapse:collapse; font-size:.72rem; }
    .arq-table th { text-align:left; padding:7px 10px; font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--blue-dark); border-bottom:2px solid #dde3f0; }
    .arq-table td { padding:8px 10px; border-bottom:1px solid #eef0f7; color:var(--text-dark); vertical-align:middle; }
    .arq-table tr:last-child td { border-bottom:none; }
    .arq-table tbody tr:hover td { background:var(--gray-light); }
    .arq-table input, .arq-table select { font-family:inherit; font-size:.72rem; border:1px solid #c8d0e0; border-radius:5px; padding:4px 7px; background:var(--white); color:var(--text-dark); width:100%; }
    .arq-badge { display:inline-block; font-size:.58rem; font-weight:700; text-transform:uppercase; letter-spacing:.4px; padding:2px 8px; border-radius:99px; }
    .arq-badge.planejado    { background:#eef0f7; color:#6677aa; }
    .arq-badge.ativo        { background:#e0faf0; color:#0a8055; }
    .arq-badge.descontinuado{ background:#fdeaea; color:var(--red-risk); }
    .arq-row-actions { display:flex; gap:2px; }

    /* --- Coverflow --- */
    .cflow-wrap  { position:relative; width:100%; height:270px; background:#0d1535; border-radius:12px; overflow:hidden; margin-bottom:22px; }
    .cflow-stage { position:absolute; inset:0; perspective:900px; }
    .cflow-empty-state { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(255,255,255,.25); gap:8px; font-size:.78rem; }
    .cflow-item  { position:absolute; left:50%; top:50%; transition:all .4s cubic-bezier(.4,0,.2,1); cursor:pointer; user-select:none; }
    .cflow-item img { width:230px; height:155px; object-fit:cover; border-radius:8px; box-shadow:0 8px 36px rgba(0,0,0,.65); display:block; pointer-events:none; }
    .cflow-nav   { position:absolute; top:50%; transform:translateY(-50%); z-index:20; background:rgba(0,0,0,.45); border:none; color:rgba(255,255,255,.85); font-size:1.6rem; width:38px; height:38px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; line-height:1; }
    .cflow-nav:hover { background:rgba(0,0,0,.8); color:#fff; }
    .cflow-nav-l { left:12px; }
    .cflow-nav-r { right:12px; }
    .cflow-caption { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.6); font-size:.67rem; text-align:center; white-space:nowrap; max-width:75%; overflow:hidden; text-overflow:ellipsis; pointer-events:none; }
    .cflow-dots  { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:5px; z-index:10; }
    .cflow-dot   { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.25); transition:background .2s; cursor:pointer; }
    .cflow-dot.active { background:var(--teal); }
    .cflow-toolbar { position:absolute; top:10px; right:10px; display:flex; gap:5px; z-index:20; }
    .cflow-tbtn  { background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.8); font-size:.63rem; padding:4px 10px; border-radius:6px; cursor:pointer; font-family:inherit; transition:background .15s; }
    .cflow-tbtn:hover { background:rgba(0,0,0,.8); color:#fff; }
    .cflow-tbtn.del:hover { background:rgba(180,0,0,.7); border-color:transparent; }
    .cflow-card { height:260px; border-radius:8px 8px 0 0; margin-bottom:0; }
    .cflow-card .cflow-item img { width:320px; height:220px; }

    .placeholder {
      max-width: 1100px; margin: 48px auto;
      text-align: center; padding: 20px;
    }
    .placeholder .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .placeholder h2 { font-size: 1rem; color: var(--blue-dark); margin-bottom: 6px; }
    .placeholder p  { font-size: .75rem; color: var(--text-mid); }

    /* --- Lightbox --- */
    .lightbox { position:fixed; inset:0; background:rgba(0,0,0,.93); z-index:9999; display:flex; align-items:center; justify-content:center; animation:lbIn .18s ease; }
    @keyframes lbIn { from{opacity:0} to{opacity:1} }
    .lightbox img { max-width:95vw; max-height:92vh; object-fit:contain; border-radius:6px; box-shadow:0 8px 48px rgba(0,0,0,.8); cursor:default; }
    .lightbox-close { position:fixed; top:14px; right:18px; background:rgba(255,255,255,.1); border:none; color:#fff; font-size:1.5rem; line-height:1; width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .lightbox-close:hover { background:rgba(255,255,255,.25); }

    /* --- Modal de confirmação --- */
    .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:10000; display:flex; align-items:center; justify-content:center; animation:lbIn .15s ease; }
    .confirm-box { background:var(--white); border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,.25); padding:28px 28px 20px; max-width:340px; width:90%; text-align:center; }
    .confirm-box h4 { font-size:.95rem; font-weight:700; color:var(--blue-dark); margin:0 0 8px; }
    .confirm-box p  { font-size:.76rem; color:var(--text-mid); margin:0 0 22px; line-height:1.55; }
    .confirm-actions { display:flex; gap:8px; justify-content:center; }
    .confirm-cancel { background:var(--gray-light); border:none; color:var(--text-mid); font-family:inherit; font-size:.78rem; font-weight:600; padding:9px 22px; border-radius:8px; cursor:pointer; }
    .confirm-cancel:hover { background:#e0e4ef; }
    .confirm-ok { background:var(--red-risk); border:none; color:#fff; font-family:inherit; font-size:.78rem; font-weight:700; padding:9px 22px; border-radius:8px; cursor:pointer; }
    .confirm-ok:hover { background:#c42f2f; }

    @media (max-width: 640px) {
      header h1 { font-size: 1rem; }
      .opex-grid { grid-template-columns: 1fr; }
      .header-meta { gap: 8px; }
    }

  { nome: 'hydroforce', desc: 'A Hydroforce (Hydroforce Tecnologia Ltda), sediada em Barueri, SP, oferece uma solução inteligente de monitoramento e gestão de perdas de água baseada em IoT, com hardware e inteligência artificial. O sistema coleta amostras acústicas da rede, que são analisadas por redes neurais para detectar e localizar vazamentos com precisão. Os dados são apresentados em dashboards e mapas, com alertas em tempo real, otimização de consumo e relatórios detalhados que reduzem desperdício, custos e impactos ambientais', site: 'https://hydroforce.com.br/solucoes/', vertical: 'Energia', subvertical: 'Internet das Coisas', tecnologia: '', cidade: '', estado: '', faturando: '', contatado: 'Sim', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: '' },
  { nome: 'General Instruments', desc: 'A General Instruments Ltda., desde 1989, oferece soluções completas de detecção de gases tóxicos e inflamáveis com equipamentos portáteis e fixos (marcas Crowcon e outras), além de painéis de monitoramento e estações de amostragem. Possui laboratório acreditado pelo Inmetro para calibração e oferece assistência técnica e treinamentos especializados, garantindo segurança pessoal, patrimonial e conformidade regulatória', site: 'https://www.generalinstruments.com.br/', vertical: 'Indústria / Manufatura', subvertical: 'Internet das Coisas', tecnologia: 'Hardware, IoT (Internet das Coisas), Segurança', cidade: '', estado: '', faturando: '', contatado: '', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: '' },
  { nome: 'Sagatech Brasil', desc: 'A Sagatech Brasil oferece soluções avançadas para saneamento e gestão hídrica, combinando hardware (medidor de vazão, sensores de nível, transdutores, válvulas de corte e rádios transmissores) com software de telemetria e automação. Suas plataformas SGC (individualização em condomínios), SGS (gestão sanitária) e SATS (monitoramento e controle remoto) operam via rádio ou LoRaWAN, gerando alertas, relatórios, gráficos e comando de corte, reduzindo perdas e custos com alta eficiência e sustentabilidade', site: 'https://sagatechbrasil.com.br/', vertical: 'Saneamento', subvertical: 'Internet das Coisas', tecnologia: '', cidade: '', estado: '', faturando: '', contatado: '', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: '' },
  { nome: 'LiveT', desc: 'A LiveT oferece soluções de individualização de consumo de água e gás voltadas para condomínios, com instalação de medidores inteligentes e leitura remota via telemetria. Os dados são disponibilizados em plataformas como ContaJusta e LiveT Web, promovendo maior controle por unidade, detecção rápida de vazamentos e redução de despesas. A solução personalizável gera economia, sustentabilidade e agregação de valor aos empreendimentos', site: 'https://www.livet.com.br/', vertical: 'Meio Ambiente / Sustentabilidade', subvertical: 'Internet das Coisas', tecnologia: '', cidade: '', estado: '', faturando: '', contatado: '', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: '' },
  { nome: 'Telemetra', desc: 'A Telemetra oferece individualização de consumo de água, energia e gás para condomínios e empresas, com tecnologia de telemetria integrada a um app. Fornece medidores inteligentes (Hydrus, Altair, Aquarius), coleta automática de dados e gestão via plataforma digital. A solução permite leitura online, emissão de faturas individuais, monitoramento remoto e relatórios, promovendo economia, transparência e sustentabilidade.', site: 'https://telemetra.com.br/', vertical: 'Saneamento', subvertical: 'Internet das Coisas', tecnologia: '', cidade: '', estado: '', faturando: '', contatado: '', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: '' },
  { nome: 'Bluetech Liquid', desc: 'A BlueTech Liquid, startup de Camboriú (SC), oferece soluções móveis de armazenamento e distribuição hídrica via contêineres modulares com casa de máquinas e telemetria IoT (LoRa). O sistema monitora nível, vazão, pressão, pH, condutividade, temperatura, energia e fator de potência, com gestão 24h, relatórios diários, redução de custos e instalação rápida, sem licença especial, para saneamento, indústria, agronegócio e emergências Oferece soluções modulares de armazenamento e distribuição de água em container com casa de máquina e telemetria IoT. Ideal para situações fixas ou emergenciais, seus sistemas com pressurização e monitoramento remoto atendem residências, indústrias e saneamento, com rápida instalação e volume de até 70 mil L para cerca de 150 casas', site: 'https://bluetechliquid.com.br/', vertical: 'Meio Ambiente / Sustentabilidade, Saneamento', subvertical: 'Práticas ESG (ambiental social e governança)', tecnologia: 'Automação, Hardware, Hidrômetros', cidade: 'Camburiú', estado: 'SC', faturando: 'Sim', contatado: 'Sim', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: 'B2B' },

  { nome: 'Atman Systems', desc: 'A Atman Systems (Vitória–ES) é uma integradora de hardware e software para Cidades Inteligentes, com atuação desde 2018. Seu portfólio inclui controladores semafóricos avançados (Attlas, Hellius, Virtual Loop), semáforos inteligentes, botoeiras sonoras e sistemas de prioridade seletiva para ônibus e emergência. A solução emprega sensores, câmeras e IoT para ajustes em tempo real, reduzindo congestionamentos e aumentando a eficiência do transporte público — em Goiânia, aumentou em 30% a velocidade média dos ônibus. Com integração completa, promove mobilidade urbana mais segura, fluida e sustentável.', site: 'https://atmansystems.com/#/home', vertical: 'Governo', subvertical: 'Internet das Coisas', tecnologia: 'Computação em Nuvem, Hardware, IoT (Internet das Coisas), Plataforma Digital (Web/App), Software', cidade: '', estado: '', faturando: '', contatado: '', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: '' },

  { nome: 'Afira', desc: 'A Afira oferece uma plataforma completa de IoT para gestão e monitoramento remoto em tempo real de água, energia, gás e diversas operações. Sua solução combina hardware (como medidores, sensores de reservatório e motobombas) com conectividade LoRaWAN e plataforma em nuvem (web e apps móveis), permitindo alertas, dashboards customizados e automação sem programação. Com isso, promove redução de custos, aumento de eficiência operacional e tomada de decisão inteligente em setores como saneamento, agronegócio e cidades inteligentes', site: 'https://www.afira.io/', vertical: 'Energia, Saneamento, Serviços Corporativos, Telecomunicações', subvertical: 'Análise de dados e inteligência analítica', tecnologia: 'Hardware, Hidrômetros, Software', cidade: 'Garça', estado: 'SP', faturando: 'Sim', contatado: '', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: 'B2B' },
  { nome: 'Nouvenn', desc: 'A Nouvenn oferece um ecossistema IoT device‑agnostic que integra hardware e software para Cidades Inteligentes, Agro 4.0 e Indústria 4.0. Seu principal produto, o Pipe Flow Controller (PFC), monitora medidores com saída pulsada via NB‑IoT, GSM ou rede mesh, enviando dados seguros à nuvem. A plataforma fornece supervisão remota, detecção de falhas/fraudes, alertas, telegestão e suporte ciberseguro, permitindo gestão escalável e eficiente de água, energia, gás e iluminação pública A Nouvenn é especialista em soluções IoT para Cidades Inteligentes, Agro 4.0, Indústria 4.0 e Cibersegurança. Oferece tecnologia device-agnostic, suporte contínuo, controladoras de iluminação e dispositivos de medição inteligente.', site: 'https://www.nouvenn.com/', vertical: 'Governo, Indústria / Manufatura, Logística / Mobilidade', subvertical: 'Internet das Coisas', tecnologia: 'Hardware, Hidrômetros, Software', cidade: 'Santa Rita do Sapucaí', estado: 'MG', faturando: 'Sim', contatado: '', email: '', telefone: '', representante: '', cargo: '', diferenciais: '', publico: 'B2B' },

  { nome: 'Stattus 4', desc: 'Oferece soluções IoT+IA para detectar vazamentos e perdas de água. Seus produtos 4Fluid Mobile e Sistema Ada monitoram redes hídricas, já auditam 7 M hidrômetros e salvam 540 k m³ de água, atendendo 250+ cidades. A Stattus 4 é uma cleantech que une IoT e IA para reduzir perdas em redes de água. A solução inclui o 4Fluid Mobile, que digitaliza a varredura com hastes de escuta e app, substituindo geofonia manual; e o Ada, sensores de pressão contínua para detecção precoce de falhas. Tudo se integra em plataforma com dashboards e alertas em tempo real, agilizando decisões, otimizando operação e reduzindo vazamentos de forma eficiente.', site: 'https://stattus4.com/', vertical: 'Saneamento', subvertical: 'Internet das Coisas', tecnologia: 'Hidrômetros, IoT (Internet das Coisas), Software', cidade: 'Sorocaba', estado: 'SP', faturando: 'Sim', contatado: 'Sim', email: 'ericson.luiz@stattus4.com', telefone: '', representante: '', cargo: '', diferenciais: '', publico: 'B2B' },

  { nome: 'Protagonizza', desc: 'A plataforma Protagonizza é uma solução digital criada para oferecer apoio a mulheres em situação de violência doméstica e de vulnerabilidade social. O objetivo principal é oferecer uma rede de apoio virtual, centralizando serviços multidisciplinares do âmbito público e privado. A plataforma atualmente está em POC cos duas prefeituras já trazendo a oferta de serviços, capacitações e vagas de emprego a mulheres em situação de violência e vulnerabilidade, sendo um canal que centraliza e direciona a todos os serviços existentes. A plataforma tem a oferta de serviços privados multidisciplinares indo desde psicólogos, médicos, dentistas, advogados, assistência social, consultorias, entre outros. Além de ofertar capacitações para o mercado formal e empreendedorismo e vagas de emprego. Os serviços privados são oferecidos a um custo reduzido pelos profissionais (desconto percentual). As mulheres não tem custo para se registrarem na plataforma, já os profissionais para cadastrarem seus serviços possuem uma mensalidade de R$ 17,00. A plataforma funciona como um hub que centraliza serviços e informações. Ela conecta as mulheres a uma variedade de profissionais e serviços, tanto públicos quanto privados, de forma humanizada e sem revitimizá-las ou expô-las.', site: 'https://protagonizza.com.br/', vertical: 'Governo', subvertical: 'Gestão pública digital', tecnologia: 'Plataforma Digital (Web/App)', cidade: 'Caxias do Sul', estado: 'RS', faturando: 'Sim', contatado: '', email: 'Brenda.medina250@gmail.com', telefone: '51 995395186', representante: 'Brenda Luiza Medina Rech', cargo: 'Founder', diferenciais: '', publico: 'B2B2G, B2G' },

  { nome: 'SmartCityTec', desc: 'A SmartCityTec entrega uma plataforma de interoperabilidade baseada no framework FIWARE, que implementa um espaço de dados soberano para municípios e parceiros. Integra, em tempo real, sensores IoT, câmeras (incl. LPR), estações meteorológicas e sistemas legados (tributário, saúde, obras, turismo), padronizando dados via NGSI-LD e APIs abertas. O núcleo inclui broker de contexto, adaptadores/ETLs, API gateway, orquestração de eventos, painéis operacionais com mapas e analytics, gerando alertas e automações. Suporta SSO (incl. gov.br), trilhas de auditoria e LGPD. Oferece publicação de dados abertos (ex.: CKAN), implantação cloud ou on-premise, alta disponibilidade e modelo de cobrança por uso (tokens). Módulos opcionais: clima e gestão de desastres, mobilidade e tráfego/LPR, turismo inteligente (Cadastur), segurança de ativos e sala de situação. Inclui capacitação, suporte e transferência de conhecimento, garantindo interoperabilidade, continuidade e independência tecnológica.', site: 'smartcity.tec.br', vertical: 'Governo', subvertical: 'Inteligência artificial', tecnologia: 'Automação, Energia, IoT (Internet das Coisas), Plataforma Digital (Web/App), Rastreamento, Software', cidade: 'Florianópolis', estado: 'SC', faturando: 'Sim', contatado: 'Sim', email: 'eloi@smartcity.tec.br', telefone: '48 991882790', representante: 'Elloi Ronnau', cargo: 'CEO', diferenciais: '', publico: 'B2B, B2G' },
  { nome: 'Bairros Inteligentes', desc: 'A solução da startup Bairros Inteligentes é uma plataforma de gestão urbana inteligente, baseada em um Super Aplicativo (para Android e iOS) e uma Plataforma Web. Ela foi desenvolvida para otimizar a comunicação e a zeladoria, transformando a relação entre cidadãos, gestores públicos e empresas. A plataforma atua como uma solução de Zeladoria 3.0, permitindo que moradores e agentes públicos colaborem no monitoramento e na gestão ágil e georreferenciada de problemas urbanos. Com a metodologia de Urbanismo Policêntrico, ela promove a colaboração e a inovação aberta nos territórios. A solução atende a múltiplos mercados: Para Governos: Oferece ferramentas para uma gestão mais eficiente e transparente, permitindo a criação de políticas públicas baseadas em dados e a aceleração de iniciativas como Operações Urbanas Consorciadas (OUCs). Para o Mercado Imobiliário: Gera valor estratégico por meio da aceleração comercial de lançamentos com a chancela "Condomínios Sustentáveis em Bairros Inteligentes", além de transferir novas tecnologias para toda a cadeia do setor. Para Investidores: Fornece inteligência urbana para a tomada de decisões lucrativas, alinhadas a Objetivos de Desenvolvimento Sustentável (ODS) e projetos de impacto. O modelo de negócio da startup, validado em Campinas como um Laboratório Vivo e em processo de incubação na IMATech, é escalável e replicável. A solução pode ser implementada em outras cidades através de licenciamento de tecnologia ou Parcerias Público-Privadas (PPPs).', site: 'https://www.bairrosinteligentes.com.br/', vertical: 'Educação, Energia, Governo, Meio Ambiente / Sustentabilidade, Saúde, Segurança, Varejo / E-comerce', subvertical: 'Gestão pública digital', tecnologia: 'Computação em Nuvem, Plataforma Digital (Web/App), Realidade Aumentada / Realidade Virtual', cidade: 'Campinas', estado: 'SP', faturando: 'Sim', contatado: '', email: 'josu.menezes@gmail.com', telefone: '19997089988', representante:   { nome: 'Tieta Artificial Intelligence LTDA', desc: 'A MANTOAN nasce de uma tese de doutorado em avaliação da aprendizagem, com o objetivo de melhorar a análise e o uso pedagógico de itens de avaliação. A solução é composta por duas APIs principais: 🔍 API de Classificação: realiza análises automatizadas de resoluções e padrões de desempenho com apoio de IA e visão computacional. 📈 API de Predição de Parâmetros de Itens: voltada à estimativa precisa dos parâmetros de questões (como dificuldade, discriminação etc.), oferecendo uma alternativa robusta aos pré-testes tradicionais, com ganho de tempo e redução de custos. Essas tecnologias foram validadas em ambiente real por meio de um aplicativo aplicado em cursos preparatórios para o ENEM, demonstrando alto potencial de escalabilidade.', site: 'www.tieta.ai', vertical: 'Educação, Governo', subvertical: 'Ensino digital', tecnologia: 'Inteligência Artificial', cidade: 'Niterói', estado: 'RJ', faturando: 'Não', contatado: '', email: 'kmarinho@tieta.ai', telefone: '21998776680', representante: 'Karla Azeredo Ribeiro Marinho', cargo: 'Diretora Executiva', diferenciais: '', publico: 'B2B2C' },
  { nome: 'Sintezy Healthtech', desc: 'Atualmente, na abordagem tradicional da anamnese realizada no Brasil, há alguns problemas: 1) atenção do médico dividida entre o paciente e a tela do computador, 2) muito tempo e esforço despendido com documentação, 3) registros incompletos. Esses fatores acabam gerando falta de eficiência operacional e agravamento das filas nas instituições. Nossa proposta de solução é integrar a tecnologia da Sintezy às consultas médicas, automatizando o preenchimento do prontuário eletrônico por meio da transcrição em tempo real da conversa entre médico e paciente. Com isso, eliminamos a necessidade de digitação manual, tornando o processo significativamente mais ágil e eficiente em comparação ao método tradicional, permitindo que o médico concentre sua atenção no paciente e otimize o tempo de atendimento.', site: 'sintezy.com', vertical: 'Saúde', subvertical: 'Tecnologias para saúde', tecnologia: 'Inteligência Artificial, Software', cidade: 'Campinas', estado: 'SP', faturando: 'Sim', contatado: '', email: 'nathan@sintezy.com', telefone: '19991807520', representante: 'Nathan Ferraz Batistella', cargo: 'Diretor-executivo', diferenciais: '', publico: 'B2B, B2B2C, B2C' },
  { nome: 'Sanapp - Gestão Inteligente de Ativos de Saneamento', desc: 'A SANAPP - GESTÃO INTELIGENTE DE ATIVOS DE SANEAMENTO - É UMA STARTUP GREENTECH, CRIADA EM 2022 E SEDIADA EM FLORIANÓPOLIS/SC, INSERIDA DIRETAMENTE NA CULTURA ESG E VINCULADA ÀS ODS DA ONU, COM SOLUÇÕES PARA CIDADES INTELIGENTES. ALIAMOS INOVAÇÃO COM CULTURA DE DADOS PARA MELHORAR O SANEAMENTO BÁSICO. DESENVOLVIDA PARA POTENCIALIZAR O COMPROMISSO DE EMPRESAS COM A EXCELÊNCIA E RESPONSABILIDADE, NOSSA SOLUÇÃO NÃO APENAS CENTRALIZA E ANALISA DADOS CRÍTICOS PARA A TOMADA DE DECISÕES, MAS TAMBÉM SE ALINHA PERFEITAMENTE À POLÍTICA DE SUSTENTABILIDADE DAS EMPRESAS, TRANSFORMANDO SUA USABILIDADE EM UM DIFERENCIAL ESTRATÉGICO PARA LIDERANÇA E EFICIÊNCIA OPERACIONAL, E POSICIONANDO NOSSOS CLIENTES NA VANGUARDA DA GESTÃO SUSTENTÁVEL E INOVADORA.', site: 'https://geosanapp.com.br/', vertical: 'Governo, Meio Ambiente / Sustentabilidade, Saneamento', subvertical: 'Análise de dados e inteligência analítica', tecnologia: 'Hidrômetros, Industria 4.0, Inteligência Artificial, IoT (Internet das Coisas), Plataforma Digital (Web/App), Realidade Aumentada / Realidade Virtual, Redes avançadas (2G; 3G; 4G; 5G; NB-IoT; LoRaWAN), Software, Sustentabilidade', cidade: 'Florianópolis', estado: 'SC', faturando: 'Não', contatado: 'Sim', email: 'maite@geosanapp.com.br', telefone: '(48)99610-0718', representante: 'Maitê Sant\'Ana Vieira', cargo: 'Co fundadora e COO', diferenciais: '', publico: 'B2B, B2G' },

  { nome: 'Medme', desc: 'A MEDME é uma plataforma de telefisioterapia, baseada em Value-Based Healthcare (VBHC), que oferece triagem por complexidade, avaliações clínicas estruturadase prescrição de exercícios. Utilizamos a IA como co-piloto dos profissionais em toda a jornada, evolução e predição de tratamentos. Acompanha em tempo real a adesão dos pacientes, identifica riscos precocemente e ajustem o plano de cuidado com base em dados clínicos e comportamentais. A solução integra módulos de avaliação, tratamento, engajamento e indicadores de desfecho clínico.', site: 'www.medme.care', vertical: 'Saúde', subvertical: 'Tecnologias para saúde', tecnologia: 'Computação em Nuvem, Inteligência Artificial, Plataforma Digital (Web/App), Software', cidade: 'Curitiba', estado: 'PR', faturando: 'Sim', contatado: '', email: 'graciele@medme.care', telefone: '41996449693', representante: 'Graciele Cielo', cargo: 'CEO', diferenciais: '', publico: 'B2B, B2G' },

  { nome: 'Girus Soluções em Turismo', desc: 'Visite Mais – PWA de Inteligência Turística Descrição da Solução O Visite Mais é uma Plataforma Web Progressiva (PWA) que funciona por meio de QR Codes instalados em atrativos turísticos, oferecendo ao visitante acesso imediato a informações contextuais (história, serviços, dicas, rotas) e à gestão um painel administrativo avançado para análise de dados em tempo real. O sistema é leve, responsivo, acessível em qualquer navegador e pode ser instalado como aplicativo simplificado (Add to Home Screen). Além disso, utiliza tecnologias de cache para manter o funcionamento mesmo em áreas com conectividade limitada. Impacto em Conectividade •	Maximização da infraestrutura da Unifique: o Visite Mais torna tangível o valor da conectividade (fibra, 5G, Wi-Fi), já que demonstra ao visitante a estabilidade do acesso e ao gestor o impacto das redes no fluxo turístico. •	Eficiência em baixa banda: o PWA opera com páginas otimizadas, carregamento assíncrono e cache offline parcial, garantindo boa experiência em regiões de cobertura limitada, comum em áreas turísticas ou prédios históricos. •	Integração com hotspots Wi-Fi: o sistema pode ser promovido como serviço de valor agregado da conectividade Unifique, ampliando o engajamento de clientes corporativos (prefeituras, museus, instituições culturais). Impacto em Tecnologia •	Cloud e Edge: o painel administrativo do Visite Mais pode rodar em infraestrutura em nuvem da Unifique, aproveitando escalabilidade, baixa latência e segurança. •	Segurança da informação: opera em conformidade com a LGPD, utilizando coleta anônima e agregada, com controle de acesso e registros auditáveis. •	Arquitetura modular: o sistema se adapta tanto para destinos turísticos quanto para museus, utilizando a mesma base tecnológica. •	Disponibilidade rápida: a solução pode estar em operação em até 15 dias úteis, reduzindo o time-to-value e acelerando a inovação em territórios conectados pela Unifique. Impacto em Melhoria de Processos •	Gestão baseada em dados: o painel entrega indicadores como mapa de calor, perfis, jornadas, sentimento, atividade e usuários, permitindo decisões estratégicas em tempo real. •	Eficiência operacional: substitui materiais impressos por conteúdos digitais atualizáveis, reduzindo custos e tempo de atualização. •	Transformação digital: acelera a adoção de práticas de “destinos e atrativos inteligentes”, alinhando-se às metas de inovação de prefeituras e instituições de turismo. •	Inclusão cultural: melhora a experiência do visitante com informações acessíveis, organizadas e disponíveis em múltiplos idiomas. Diferenciais •	PWA leve + offline parcial: solução robusta para ambientes de conectividade variável. •	Multiplataforma: funciona em qualquer dispositivo, sem barreira de instalação. •	Um único sistema para diferentes contextos (destinos, equipamentos culturais e turísticos). •	LGPD by design: privacidade e segurança como princípios centrais. •	Ativação em até 15 dias úteis: implantação rápida, permitindo respostas imediatas a demandas de inovação.', site: 'www.girus.com.br', vertical: 'Governo', subvertical: 'Análise de dados e inteligência analítica', tecnologia: 'Computação em Nuvem, Plataforma Digital (Web/App), Software', cidade: 'Florianópolis', estado: 'SC', faturando: 'Sim', contatado: '', email: 'cappelini@gmail.com', telefone: '48999045791', representante: 'Carlos Cappelini', cargo: 'Sócio-fundador', diferenciais: '', publico: 'B2B, B2G' },
  { nome: 'Pix Force', desc: 'A Pix Force apresenta o Pix Labs, um sistema de proteção à receita que utiliza visão computacional e inteligência artificial para revolucionar o mercado da Indústria 4.0. Esta solução é projetada para interpretar automaticamente imagens e vídeos, transformando a forma como as inspeções de campo são realizadas. O centro da solução está na captura de dados avançada, utilizando sensores embarcados em um carro, com câmeras 360°, LiDAR e GPS para coletar imagens e informações de campo. As imagens capturadas incluem uma visão de 360° e também capturam detalhes de alta resolução. Os dados coletados alimentam redes neurais que realizam diversas funções críticas. Uma das principais é a detecção de furos de energia (fraudes). O sistema também realiza a classificação de fachadas entre residenciais e comerciais e a identificação e leitura de placas em cabos ("plaquetas"). As redes neurais alcançam altas métricas de performance, como 92.3% de Precisão, 89.9% de Recall e 91.1% de F1-score na identificação e classificação de potência de luminárias. A solução reduz significativamente a necessidade de inspeções presenciais, otimizando a auditoria da receita. Todas as informações processadas são disponibilizadas em uma Plataforma de visualização dos dados, chamada SVI (Street View Imagery). Esta plataforma registra evidências visuais com alta resolução, permitindo a localização de eventos de interferência (como uma fachada residencial ou comercial) no mapa com suas coordenadas e timestamps. Há também uma etapa de validação por humanos para refinar o processo. O resultado é uma maior eficácia nas ações e mais segurança para os técnicos. Essa solução foi desenvolvida com sucesso em conjunto com a CEMIG através de um projeto de P&D.', site: 'https://pixforce.com/pt-br/', vertical: 'Agro, Energia, Indústria / Manufatura, Segurança', subvertical: 'Antifraude', tecnologia: 'Inteligência Artificial, Plataforma Digital (Web/App), Software', cidade: 'Porto Alegre   { nome: 'Multi Cast', desc: 'Solução inteligente e de baixo custo voltada à detecção precoce, monitoramento e envio automático de alertas de alagamentos urbanos, no contexto de cidades inteligentes. O sistema integra sensores IoT interconectados em rede, instalados em pontos críticos como bocas de lobo, galerias pluviais e postes situados em regiões com histórico de alagamentos ou risco elevado de inundação. Essa rede realiza a leitura de grandezas físicas, como umidade, temperatura e nível de água, utilizando um sensor próprio desenvolvido especialmente para este projeto, projetado para operar com precisão em condições ambientais adversas. Os dados coletados são processados e interpretados em tempo real, permitindo identificar padrões de comportamento das grandezas monitoradas e detectar indícios de risco iminente. Com base nessa análise, o sistema emite alertas automáticos à Defesa Civil, à prefeitura e à população, possibilitando respostas rápidas e coordenadas diante de situações críticas. O objetivo é prevenir ocorrências de alagamentos, informar de forma ágil e precisa os agentes públicos e a população sobre as áreas afetadas, evitar o tráfego de veículos e pedestres em zonas de risco e sugerir rotas alternativas, contribuindo para deslocamentos seguros e para a redução dos impactos à mobilidade e à segurança urbana.', site: 'multicast.com.br', vertical: 'Segurança', subvertical: 'Internet das Coisas', tecnologia: '', cidade: 'Ascurra', estado: '', faturando: 'Não', contatado: 'Sim', email: 'julioschuambach.dev@gmail.com', telefone: '47999564267', representante: 'Júlio Eduardo Schuambach', cargo: 'Proprietário Fundador', diferenciais: '', publico: '' },
  { nome: 'Minha coleta', desc: 'Somos uma plataforma tecnológica que conecta a cadeia de resíduos do gerador à indústria em um ecossistema estruturado. Os geradores de resíduos aderem ao nosso ao sistema de gestão de resíduos e através disso engajam os stakeholders usando educação ambiental gamificada e reduzem todo seu backoffice ambiental. Contamos com uma rede de transportadores e cooperativas, que podem participar de concorrências de coleta dos geradores e que usam nosso sistema para organizar rotas, recebimento, estoque de materiais entre diversas outras funcionalidades. Todo processo é rastreado gerando os créditos de logística reversa que os próprios operadores podem comercializar com as marcas e entidades gestoras aumentando seus ganhos com rastreamento blockchain.', site: 'http://www.minhacoleta.com.br', vertical: 'Meio Ambiente / Sustentabilidade', subvertical: 'Práticas ESG (ambiental social e governança)', tecnologia: '', cidade: 'Florianópolis', estado: '', faturando: 'Sim', contatado: '', email: 'artur.andrade@mobway.cloud', telefone: '+55 48 9654-1650', representante: 'Artur Andrade', cargo: 'CEO', diferenciais: '', publico: '' },

  { nome: 'Intelus', desc: 'A Intelus é uma startup de Inteligência de Dados e Geomarketing especializada no setor de telecomunicações, criada para apoiar ISPs e grandes operadoras na tomada de decisão estratégica baseada em dados confiáveis, integrados e acionáveis. A plataforma consolida e cruza dados públicos, privados e internos do provedor em uma única interface, entregando insights de mercado, expansão, concorrência, risco, crédito e rentabilidade ao longo de todo o ciclo do negócio — da prospecção à retenção de clientes.', site: 'https://intelus.com.br/', vertical: 'Educação, Governo, Outros, Saúde, Segurança, Serviços Corporativos, Telecomunicações', subvertical: 'Análise de dados e inteligência analítica, Automação de processos, Gestão pública digital, Inteligência artificial, Tecnologias para RH, Tecnologias para saúde', tecnologia: 'Chatbots, Computação em Nuvem, Finanças, Inteligência Artificial, Outros, Plataforma Digital (Web/App)', cidade: 'Juiz de Fora', estado: 'MG', faturando: 'Sim', contatado: 'Sim', email: 'xavier@intelus.com.br', telefone: '32984083076', representante: 'Fabricio Xavier Alves', cargo: 'CTO', diferenciais: 'A Intelus não é apenas uma ferramenta de dados. É uma plataforma estratégica de inteligência para expansão, competitividade e rentabilidade, com um nível de profundidade territorial, preditiva e integrada que as alternativas existentes não entregam. A Intelus se diferencia por oferecer uma visão integrada em uma única plataforma, unificando mercado, expansão, prospecção, risco e rentabilidade. A solução opera com alto nível de granularidade territorial, chegando ao nível de rua, o que permite decisões mais precisas de expansão de rede. Utiliza de forma intensiva dados regulatórios e públicos estratégicos, transformando informações complexas em inteligência acionável. Além disso, vai além do BI tradicional ao incorporar modelos preditivos, apoiando previsões de crescimento, churn e retorno sobre investimento. Entrega prospecção <script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso — Unifique Cidades Inteligentes</title>
  <style>
    :root {
      --blue-dark: #1a2b8c;
      --blue-mid:  #2540c0;
      --teal:      #00c8d4;
      --white:     #ffffff;
      --gray-light:#f4f6fb;
      --text-dark: #1a2340;
      --text-mid:  #3a4a6b;
      --red:       #e03c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
    }
    .brand {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--teal);
      font-weight: 700;
      margin-bottom: 6px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--blue-dark);
      margin-bottom: 28px;
      line-height: 1.3;
    }
    label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #dde3f0;
      border-radius: 8px;
      font-family: inherit;
      font-size: .875rem;
      color: var(--text-dark);
      outline: none;
      transition: border-color .18s;
      margin-bottom: 16px;
    }
    input:focus { border-color: var(--teal); }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .18s;
      margin-top: 4px;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .error {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: var(--red);
      font-size: .78rem;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: .75rem;
      color: var(--text-mid);
      text-decoration: none;
    }
    .back:hover { color: var(--blue-dark); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Unifique</div>
    <h1>Acesso à Plataforma de Pesquisa</h1>
    <div class="error" id="err">Usuário ou senha incorretos.</div>
    <form id="form" onsubmit="doLogin(event)">
      <label for="u">Usuário</label>
      <input type="text" id="u" name="username" autocomplete="username" required />
      <label for="p">Senha</label>
      <input type="password" id="p" name="password" autocomplete="current-password" required />
      <button class="btn" type="submit" id="btn">Entrar</button>
    </form>
    <a class="back" href="/">← Voltar ao site</a>
  </div>
  <script>
    // Already logged in?
    if (localStorage.getItem('uscToken')) window.location.replace('/app');

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Aguarde...';
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('u').value,
            password: document.getElementById('p').value,
          }),
        });
        if (res.ok) {
          const { token } = await res.json();
          localStorage.setItem('uscToken', token);
          window.location.replace('/app');
        } else {
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      } catch {
        err.textContent = 'Erro de conexão. Tente novamente.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
